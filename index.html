<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#050711" />
  <meta name="description" content="Fast on-device Iraqi phone number scanner with AI-assisted OCR." />
  <title>Iraqi Scanner AI</title>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@7/dist/tesseract.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" rel="stylesheet" />
  <style>
    :root {
      color-scheme: dark;
      --bg: #050711;
      --panel: rgba(10, 14, 29, .86);
      --panel-solid: #0a0e1d;
      --line: rgba(255, 255, 255, .09);
      --muted: #77819a;
      --text: #f6f8ff;
      --cyan: #52e7ff;
      --cyan-rgb: 82, 231, 255;
      --violet: #9a7cff;
      --violet-rgb: 154, 124, 255;
      --green: #50f5a4;
      --green-rgb: 80, 245, 164;
      --amber: #ffca68;
      --danger: #ff718b;
      --target-x: 5%;
      --target-y: 40%;
      --target-w: 90%;
      --target-h: 20%;
      --score: 0deg;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      overflow: hidden;
      background: var(--bg);
    }

    body {
      min-height: 100dvh;
      color: var(--text);
      font-family: "Space Grotesk", system-ui, sans-serif;
      display: flex;
      justify-content: center;
      position: relative;
    }

    button,
    a {
      font: inherit;
    }

    button {
      border: 0;
    }

    .ambient {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      background:
        radial-gradient(circle at 15% 8%, rgba(var(--violet-rgb), .12), transparent 31%),
        radial-gradient(circle at 90% 38%, rgba(var(--cyan-rgb), .08), transparent 29%),
        linear-gradient(145deg, #050711 0%, #070914 50%, #04060e 100%);
    }

    .ambient::before,
    .ambient::after {
      content: "";
      position: absolute;
      width: 280px;
      height: 280px;
      border-radius: 50%;
      filter: blur(80px);
      opacity: .16;
      animation: drift 12s ease-in-out infinite alternate;
    }

    .ambient::before {
      top: -130px;
      right: -80px;
      background: var(--cyan);
    }

    .ambient::after {
      bottom: -140px;
      left: -100px;
      background: var(--violet);
      animation-delay: -5s;
    }

    @keyframes drift {
      to { transform: translate3d(28px, 34px, 0) scale(1.08); }
    }

    .app {
      width: min(100%, 560px);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      position: relative;
      z-index: 1;
      background: rgba(4, 6, 14, .58);
      box-shadow: 0 0 70px rgba(0, 0, 0, .55);
    }

    .topbar {
      min-height: 68px;
      padding: calc(10px + env(safe-area-inset-top)) 16px 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      border-bottom: 1px solid var(--line);
      background: rgba(5, 7, 17, .8);
      backdrop-filter: blur(18px);
      z-index: 10;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 11px;
      min-width: 0;
    }

    .brand-mark {
      width: 34px;
      height: 34px;
      border: 1px solid rgba(var(--cyan-rgb), .45);
      border-radius: 11px;
      position: relative;
      flex: 0 0 auto;
      background:
        radial-gradient(circle at 50% 50%, rgba(var(--cyan-rgb), .34) 0 8%, transparent 9%),
        conic-gradient(from 45deg, transparent, rgba(var(--cyan-rgb), .55), transparent 34%, rgba(var(--violet-rgb), .65), transparent 70%);
      box-shadow: inset 0 0 14px rgba(var(--cyan-rgb), .12), 0 0 18px rgba(var(--cyan-rgb), .13);
      animation: markGlow 3.2s ease-in-out infinite;
    }

    .brand-mark::before,
    .brand-mark::after {
      content: "";
      position: absolute;
      inset: 7px;
      border: 1px solid rgba(255, 255, 255, .5);
      border-radius: 50%;
    }

    .brand-mark::after {
      inset: 12px;
      background: var(--cyan);
      border: 0;
      box-shadow: 0 0 12px var(--cyan);
    }

    @keyframes markGlow {
      50% { filter: brightness(1.3); transform: rotate(4deg); }
    }

    .brand-copy {
      min-width: 0;
    }

    .brand-title {
      font-size: .86rem;
      font-weight: 700;
      letter-spacing: .16em;
      white-space: nowrap;
    }

    .brand-subtitle {
      margin-top: 2px;
      color: var(--muted);
      font-size: .59rem;
      letter-spacing: .13em;
      text-transform: uppercase;
    }

    .engine-badge {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 7px 10px;
      border: 1px solid rgba(var(--cyan-rgb), .2);
      border-radius: 999px;
      color: #a9f5ff;
      background: rgba(var(--cyan-rgb), .07);
      font-size: .58rem;
      font-weight: 700;
      letter-spacing: .1em;
      white-space: nowrap;
    }

    .engine-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--amber);
      box-shadow: 0 0 9px currentColor;
      animation: dotPulse 1.4s ease-in-out infinite;
    }

    .engine-badge.ready .engine-dot {
      background: var(--green);
    }

    .engine-badge.error .engine-dot {
      background: var(--danger);
      animation: none;
    }

    @keyframes dotPulse {
      50% { opacity: .42; transform: scale(.72); }
    }

    .camera-shell {
      position: relative;
      flex: 1 1 auto;
      min-height: 270px;
      overflow: hidden;
      background: #02030a;
      isolation: isolate;
    }

    #video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform-origin: center;
      transition: transform .4s cubic-bezier(.2, .8, .2, 1), filter .3s ease;
    }

    .camera-shell::before {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background:
        linear-gradient(180deg, rgba(2, 3, 10, .34), transparent 24%, transparent 70%, rgba(2, 3, 10, .7)),
        repeating-linear-gradient(0deg, rgba(255, 255, 255, .012) 0 1px, transparent 1px 4px);
    }

    .camera-shell::after {
      content: "";
      position: absolute;
      z-index: 2;
      left: var(--target-x);
      top: var(--target-y);
      width: var(--target-w);
      height: var(--target-h);
      border-radius: 18px;
      box-shadow: 0 0 0 999px rgba(2, 3, 10, .61);
      pointer-events: none;
      transition: box-shadow .25s ease;
    }

    .camera-tools {
      position: absolute;
      z-index: 6;
      top: 12px;
      right: 12px;
      display: flex;
      gap: 8px;
    }

    .tool-btn {
      min-width: 42px;
      height: 36px;
      padding: 0 11px;
      border: 1px solid rgba(255, 255, 255, .12);
      border-radius: 12px;
      background: rgba(7, 10, 23, .72);
      color: #dfe7ff;
      backdrop-filter: blur(12px);
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      font-size: .68rem;
      font-weight: 700;
      transition: transform .16s ease, border-color .2s ease, background .2s ease;
    }

    .tool-btn:active {
      transform: scale(.94);
    }

    .tool-btn.active {
      color: var(--cyan);
      border-color: rgba(var(--cyan-rgb), .45);
      background: rgba(var(--cyan-rgb), .12);
    }

    .tool-btn[hidden] {
      display: none;
    }

    .target {
      position: absolute;
      z-index: 4;
      left: var(--target-x);
      top: var(--target-y);
      width: var(--target-w);
      height: var(--target-h);
      border: 1px solid rgba(var(--cyan-rgb), .2);
      border-radius: 18px;
      pointer-events: none;
      background:
        linear-gradient(90deg, rgba(var(--cyan-rgb), .03), transparent 25%, rgba(var(--violet-rgb), .035) 65%, transparent);
      box-shadow: inset 0 0 24px rgba(var(--cyan-rgb), .035), 0 0 30px rgba(var(--cyan-rgb), .05);
      transition: border-color .22s ease, box-shadow .22s ease, transform .22s ease;
    }

    .corner {
      position: absolute;
      width: 27px;
      height: 27px;
      border-color: var(--cyan);
      border-style: solid;
      filter: drop-shadow(0 0 5px rgba(var(--cyan-rgb), .75));
    }

    .corner.tl { top: -2px; left: -2px; border-width: 3px 0 0 3px; border-radius: 12px 0 0; }
    .corner.tr { top: -2px; right: -2px; border-width: 3px 3px 0 0; border-radius: 0 12px 0 0; }
    .corner.bl { bottom: -2px; left: -2px; border-width: 0 0 3px 3px; border-radius: 0 0 0 12px; }
    .corner.br { bottom: -2px; right: -2px; border-width: 0 3px 3px 0; border-radius: 0 0 12px; }

    .scan-beam {
      position: absolute;
      left: 8px;
      right: 8px;
      top: 8px;
      height: 2px;
      border-radius: 50%;
      opacity: .82;
      background: linear-gradient(90deg, transparent, var(--cyan) 20%, #fff 50%, var(--violet) 80%, transparent);
      box-shadow: 0 0 10px rgba(var(--cyan-rgb), .85), 0 5px 22px rgba(var(--cyan-rgb), .3);
      animation: scanBeam 1.7s cubic-bezier(.45, 0, .55, 1) infinite;
    }

    @keyframes scanBeam {
      0% { top: 8px; opacity: 0; }
      10% { opacity: .9; }
      88% { opacity: .9; }
      100% { top: calc(100% - 10px); opacity: 0; }
    }

    .target.locking {
      border-color: rgba(255, 202, 104, .5);
      box-shadow: inset 0 0 26px rgba(255, 202, 104, .08), 0 0 28px rgba(255, 202, 104, .1);
    }

    .target.locking .corner {
      border-color: var(--amber);
    }

    .target.verified {
      border-color: rgba(var(--green-rgb), .68);
      box-shadow: inset 0 0 32px rgba(var(--green-rgb), .12), 0 0 38px rgba(var(--green-rgb), .18);
      animation: targetConfirm .55s ease;
    }

    .target.verified .corner {
      border-color: var(--green);
      filter: drop-shadow(0 0 6px rgba(var(--green-rgb), .85));
    }

    .target.verified .scan-beam {
      background: linear-gradient(90deg, transparent, var(--green), #fff, var(--green), transparent);
      box-shadow: 0 0 12px rgba(var(--green-rgb), .9);
    }

    @keyframes targetConfirm {
      45% { transform: scale(1.015); }
    }

    .reticle {
      position: absolute;
      inset: 50% auto auto 50%;
      width: 5px;
      height: 5px;
      border: 1px solid rgba(255, 255, 255, .62);
      border-radius: 50%;
      transform: translate(-50%, -50%);
      box-shadow: 0 0 8px rgba(255, 255, 255, .45);
    }

    .camera-status {
      position: absolute;
      z-index: 6;
      left: 50%;
      bottom: 13px;
      transform: translateX(-50%);
      width: max-content;
      max-width: calc(100% - 28px);
      min-height: 34px;
      padding: 8px 13px;
      border: 1px solid rgba(255, 255, 255, .1);
      border-radius: 999px;
      background: rgba(7, 10, 23, .78);
      backdrop-filter: blur(12px);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: #aab4cc;
      font-size: .67rem;
      letter-spacing: .02em;
      white-space: nowrap;
      transition: color .2s ease, border-color .2s ease, background .2s ease;
    }

    .camera-status i {
      color: var(--cyan);
      font-size: .62rem;
      animation: statusSpin 2.4s linear infinite;
    }

    @keyframes statusSpin {
      to { transform: rotate(360deg); }
    }

    .camera-status.warn {
      color: var(--amber);
      border-color: rgba(255, 202, 104, .22);
    }

    .camera-status.success {
      color: var(--green);
      border-color: rgba(var(--green-rgb), .28);
      background: rgba(9, 32, 26, .8);
    }

    .camera-status.success i {
      animation: none;
    }

    .panel {
      flex: 0 0 auto;
      padding: 14px 14px calc(14px + env(safe-area-inset-bottom));
      border-top: 1px solid var(--line);
      background: var(--panel);
      backdrop-filter: blur(24px);
      display: grid;
      gap: 11px;
      z-index: 8;
    }

    .result-card {
      min-height: 78px;
      padding: 12px 13px;
      border: 1px solid var(--line);
      border-radius: 17px;
      background:
        linear-gradient(135deg, rgba(var(--cyan-rgb), .04), transparent 42%),
        rgba(255, 255, 255, .025);
      display: flex;
      align-items: center;
      gap: 12px;
      overflow: hidden;
      position: relative;
      transition: border-color .25s ease, background .25s ease;
    }

    .result-card::after {
      content: "";
      position: absolute;
      width: 120px;
      height: 180%;
      top: -40%;
      left: -150px;
      transform: rotate(16deg);
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, .08), transparent);
    }

    .result-card.verified {
      border-color: rgba(var(--green-rgb), .26);
      background:
        linear-gradient(135deg, rgba(var(--green-rgb), .09), transparent 46%),
        rgba(255, 255, 255, .025);
    }

    .result-card.verified::after {
      animation: resultShine .8s ease;
    }

    @keyframes resultShine {
      to { left: calc(100% + 80px); }
    }

    .result-copy {
      flex: 1;
      min-width: 0;
    }

    .eyebrow {
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--muted);
      font-size: .57rem;
      font-weight: 700;
      letter-spacing: .13em;
      text-transform: uppercase;
    }

    .eyebrow .verified-label {
      display: none;
      color: var(--green);
    }

    .result-card.verified .eyebrow .scanning-label {
      display: none;
    }

    .result-card.verified .eyebrow .verified-label {
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }

    #result {
      min-height: 31px;
      margin-top: 5px;
      color: #4b5570;
      font-family: "JetBrains Mono", monospace;
      font-size: clamp(1.15rem, 5.7vw, 1.62rem);
      font-weight: 700;
      letter-spacing: .07em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      transition: color .2s ease, transform .2s ease;
    }

    #result.candidate {
      color: var(--amber);
    }

    #result.verified {
      color: var(--green);
      text-shadow: 0 0 18px rgba(var(--green-rgb), .18);
    }

    .confidence {
      width: 52px;
      height: 52px;
      flex: 0 0 auto;
      border-radius: 50%;
      background: conic-gradient(var(--cyan) var(--score), rgba(255, 255, 255, .07) 0);
      display: grid;
      place-items: center;
      position: relative;
      transition: background .35s ease;
    }

    .confidence::before {
      content: "";
      position: absolute;
      inset: 4px;
      border-radius: 50%;
      background: #0b1020;
    }

    .confidence-value {
      position: relative;
      z-index: 1;
      text-align: center;
      font-family: "JetBrains Mono", monospace;
      font-size: .62rem;
      color: #c6d1ea;
    }

    .confidence-value small {
      display: block;
      margin-top: 1px;
      color: var(--muted);
      font-family: "Space Grotesk", sans-serif;
      font-size: .4rem;
      letter-spacing: .06em;
      text-transform: uppercase;
    }

    .action-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
    }

    .action {
      min-width: 0;
      height: 56px;
      border: 1px solid var(--line);
      border-radius: 14px;
      color: #e8edff;
      background: rgba(255, 255, 255, .035);
      text-decoration: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 5px;
      cursor: pointer;
      transition: transform .16s ease, border-color .2s ease, background .2s ease, opacity .2s ease;
    }

    .action i {
      font-size: 1.05rem;
    }

    .action span {
      font-size: .59rem;
      font-weight: 700;
      white-space: nowrap;
    }

    .action:not(.disabled):active {
      transform: scale(.95);
    }

    .action.call:not(.disabled) {
      color: #07160f;
      border-color: transparent;
      background: linear-gradient(135deg, #5af6aa, #35dca2);
      box-shadow: 0 8px 22px rgba(var(--green-rgb), .14);
    }

    .action.whatsapp:not(.disabled) {
      color: #fff;
      border-color: rgba(37, 211, 102, .32);
      background: rgba(37, 211, 102, .14);
    }

    .action.viber:not(.disabled) {
      color: #fff;
      border-color: rgba(115, 96, 242, .34);
      background: rgba(115, 96, 242, .16);
    }

    .action.copy:not(.disabled) {
      color: var(--cyan);
      border-color: rgba(var(--cyan-rgb), .25);
      background: rgba(var(--cyan-rgb), .08);
    }

    .action.disabled {
      opacity: .28;
      cursor: default;
      pointer-events: none;
    }

    .diagnostics {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      min-width: 0;
    }

    .metric-row {
      display: flex;
      align-items: center;
      gap: 6px;
      min-width: 0;
      overflow: hidden;
    }

    .metric {
      padding: 5px 8px;
      border: 1px solid rgba(255, 255, 255, .07);
      border-radius: 999px;
      color: var(--muted);
      background: rgba(255, 255, 255, .02);
      font-size: .5rem;
      font-weight: 700;
      letter-spacing: .04em;
      white-space: nowrap;
    }

    .metric strong {
      color: #c6d1e8;
      font-weight: 700;
    }

    .clear-btn {
      flex: 0 0 auto;
      padding: 5px 8px;
      color: #7f8aa3;
      background: transparent;
      font-size: .56rem;
      font-weight: 700;
      cursor: pointer;
    }

    .toast {
      position: fixed;
      z-index: 30;
      left: 50%;
      bottom: calc(126px + env(safe-area-inset-bottom));
      max-width: calc(100% - 32px);
      padding: 10px 14px;
      border: 1px solid rgba(var(--green-rgb), .25);
      border-radius: 12px;
      color: var(--green);
      background: rgba(8, 24, 20, .94);
      box-shadow: 0 14px 40px rgba(0, 0, 0, .35);
      font-size: .67rem;
      font-weight: 700;
      opacity: 0;
      pointer-events: none;
      transform: translate(-50%, 12px);
      transition: opacity .2s ease, transform .2s ease;
    }

    .toast.show {
      opacity: 1;
      transform: translate(-50%, 0);
    }

    canvas {
      display: none;
    }

    @media (max-height: 690px) {
      .topbar {
        min-height: 58px;
        padding-top: calc(7px + env(safe-area-inset-top));
        padding-bottom: 7px;
      }

      .brand-subtitle,
      .diagnostics {
        display: none;
      }

      .panel {
        padding-top: 10px;
        gap: 8px;
      }

      .result-card {
        min-height: 66px;
        padding-block: 9px;
      }

      .action {
        height: 50px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        scroll-behavior: auto !important;
        animation-duration: .01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: .01ms !important;
      }
    }
  </style>
</head>
<body>
  <div class="ambient" aria-hidden="true"></div>

  <main class="app">
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true"></div>
        <div class="brand-copy">
          <div class="brand-title">IRAQI SCANNER</div>
          <div class="brand-subtitle">On-device neural OCR</div>
        </div>
      </div>
      <div id="engineBadge" class="engine-badge" aria-live="polite">
        <span class="engine-dot"></span>
        <span id="engineLabel">BOOTING AI</span>
      </div>
    </header>

    <section id="cameraShell" class="camera-shell" aria-label="Camera scanner">
      <video id="video" autoplay playsinline muted></video>

      <div class="camera-tools">
        <button id="torchBtn" class="tool-btn" type="button" aria-label="Toggle camera light" hidden>
          <i class="fa-solid fa-bolt" aria-hidden="true"></i>
        </button>
        <button id="zoomBtn" class="tool-btn active" type="button" aria-label="Toggle camera zoom">
          <i class="fa-solid fa-magnifying-glass" aria-hidden="true"></i>
          <span id="zoomLabel">2×</span>
        </button>
      </div>

      <div id="target" class="target" aria-hidden="true">
        <span class="corner tl"></span>
        <span class="corner tr"></span>
        <span class="corner bl"></span>
        <span class="corner br"></span>
        <span class="scan-beam"></span>
        <span class="reticle"></span>
      </div>

      <div id="cameraStatus" class="camera-status" aria-live="polite">
        <i class="fa-solid fa-atom" aria-hidden="true"></i>
        <span id="statusText">Starting camera…</span>
      </div>
    </section>

    <section class="panel" aria-label="Scanned number">
      <div id="resultCard" class="result-card">
        <div class="result-copy">
          <div class="eyebrow">
            <span class="scanning-label"><i class="fa-solid fa-wave-square" aria-hidden="true"></i> Live recognition</span>
            <span class="verified-label"><i class="fa-solid fa-shield-halved" aria-hidden="true"></i> AI verified</span>
          </div>
          <div id="result">07•• ••• ••••</div>
        </div>
        <div id="confidence" class="confidence" aria-label="Recognition confidence">
          <div class="confidence-value"><span id="confidenceValue">0%</span><small>match</small></div>
        </div>
      </div>

      <div class="action-grid" aria-label="Number actions">
        <a id="callAction" class="action call disabled" aria-disabled="true">
          <i class="fa-solid fa-phone" aria-hidden="true"></i>
          <span>Phone</span>
        </a>
        <a id="whatsappAction" class="action whatsapp disabled" aria-disabled="true" target="_blank" rel="noopener">
          <i class="fa-brands fa-whatsapp" aria-hidden="true"></i>
          <span>WhatsApp</span>
        </a>
        <a id="viberAction" class="action viber disabled" aria-disabled="true">
          <i class="fa-brands fa-viber" aria-hidden="true"></i>
          <span>Viber</span>
        </a>
        <button id="copyAction" class="action copy disabled" type="button" disabled>
          <i class="fa-regular fa-copy" aria-hidden="true"></i>
          <span>Copy</span>
        </button>
      </div>

      <div class="diagnostics">
        <div class="metric-row">
          <span class="metric">FRAME <strong id="qualityMetric">—</strong></span>
          <span class="metric">OCR <strong id="latencyMetric">—</strong></span>
          <span class="metric">VERIFY <strong id="voteMetric">0/2</strong></span>
        </div>
        <button id="clearBtn" class="clear-btn" type="button">RESET</button>
      </div>
    </section>
  </main>

  <canvas id="qualityCanvas"></canvas>
  <canvas id="ocrCanvas"></canvas>
  <canvas id="nativeCanvas"></canvas>
  <div id="toast" class="toast" role="status"></div>

  <script>
    "use strict";

    // Scanner geometry and performance targets.
    var BOX_WIDTH = 0.90;
    var BOX_HEIGHT = 0.20;
    var CSS_ZOOM = 1.8;
    var OCR_HEIGHT = 104;
    var REQUIRED_VOTES = 2;
    var VOTE_WINDOW_MS = 4200;
    var MIN_TESS_CONFIDENCE = 42;

    var video = document.getElementById("video");
    var cameraShell = document.getElementById("cameraShell");
    var target = document.getElementById("target");
    var cameraStatus = document.getElementById("cameraStatus");
    var statusText = document.getElementById("statusText");
    var engineBadge = document.getElementById("engineBadge");
    var engineLabel = document.getElementById("engineLabel");
    var zoomBtn = document.getElementById("zoomBtn");
    var zoomLabel = document.getElementById("zoomLabel");
    var torchBtn = document.getElementById("torchBtn");
    var resultCard = document.getElementById("resultCard");
    var result = document.getElementById("result");
    var confidence = document.getElementById("confidence");
    var confidenceValue = document.getElementById("confidenceValue");
    var qualityMetric = document.getElementById("qualityMetric");
    var latencyMetric = document.getElementById("latencyMetric");
    var voteMetric = document.getElementById("voteMetric");
    var clearBtn = document.getElementById("clearBtn");
    var callAction = document.getElementById("callAction");
    var whatsappAction = document.getElementById("whatsappAction");
    var viberAction = document.getElementById("viberAction");
    var copyAction = document.getElementById("copyAction");
    var toast = document.getElementById("toast");

    var qualityCanvas = document.getElementById("qualityCanvas");
    var ocrCanvas = document.getElementById("ocrCanvas");
    var nativeCanvas = document.getElementById("nativeCanvas");
    var qualityCtx = qualityCanvas.getContext("2d", { willReadFrequently: true });
    var ocrCtx = ocrCanvas.getContext("2d", { willReadFrequently: true });
    var nativeCtx = nativeCanvas.getContext("2d", { willReadFrequently: true });

    var scanner = {
      ready: false,
      busy: false,
      track: null,
      worker: null,
      workerPromise: null,
      nativeDetector: null,
      nativeMisses: 0,
      hardwareZoom: false,
      zoomed: true,
      torchOn: false,
      previousFrame: null,
      votes: [],
      confirmed: null,
      lastCandidate: null,
      lastConfidence: 0,
      toastTimer: null
    };

    function clamp(value, min, max) {
      return Math.min(max, Math.max(min, value));
    }

    function setStatus(message, tone, iconClass) {
      statusText.textContent = message;
      cameraStatus.className = "camera-status" + (tone ? " " + tone : "");
      var icon = cameraStatus.querySelector("i");
      icon.className = iconClass || "fa-solid fa-atom";
    }

    function showToast(message) {
      clearTimeout(scanner.toastTimer);
      toast.textContent = message;
      toast.classList.add("show");
      scanner.toastTimer = setTimeout(function () {
        toast.classList.remove("show");
      }, 1800);
    }

    function setConfidence(value) {
      var score = clamp(Math.round(value || 0), 0, 100);
      confidence.style.setProperty("--score", (score * 3.6) + "deg");
      confidenceValue.textContent = score + "%";
    }

    function positionTarget() {
      var width = cameraShell.clientWidth;
      var height = cameraShell.clientHeight;
      var targetWidth = width * BOX_WIDTH;
      var targetHeight = height * BOX_HEIGHT;
      var left = (width - targetWidth) / 2;
      var top = (height - targetHeight) / 2;

      document.documentElement.style.setProperty("--target-x", left + "px");
      document.documentElement.style.setProperty("--target-y", top + "px");
      document.documentElement.style.setProperty("--target-w", targetWidth + "px");
      document.documentElement.style.setProperty("--target-h", targetHeight + "px");
    }

    window.addEventListener("resize", positionTarget);

    async function applyHardwareZoom(level) {
      if (!scanner.track || typeof scanner.track.getCapabilities !== "function") return false;
      try {
        var capabilities = scanner.track.getCapabilities();
        if (!capabilities.zoom) return false;
        var zoom = clamp(level, capabilities.zoom.min, capabilities.zoom.max);
        await scanner.track.applyConstraints({ advanced: [{ zoom: zoom }] });
        return true;
      } catch (error) {
        return false;
      }
    }

    function applyCssZoom(enabled) {
      video.style.transform = enabled ? "scale(" + CSS_ZOOM + ")" : "scale(1)";
    }

    async function initializeCameraFeatures() {
      var capabilities = typeof scanner.track.getCapabilities === "function"
        ? scanner.track.getCapabilities()
        : {};

      var preferred = {};
      if (Array.isArray(capabilities.focusMode) && capabilities.focusMode.indexOf("continuous") >= 0) {
        preferred.focusMode = "continuous";
      }
      if (Array.isArray(capabilities.exposureMode) && capabilities.exposureMode.indexOf("continuous") >= 0) {
        preferred.exposureMode = "continuous";
      }
      if (Array.isArray(capabilities.whiteBalanceMode) && capabilities.whiteBalanceMode.indexOf("continuous") >= 0) {
        preferred.whiteBalanceMode = "continuous";
      }

      if (Object.keys(preferred).length) {
        try {
          await scanner.track.applyConstraints({ advanced: [preferred] });
        } catch (error) {
          console.info("Continuous camera controls are not available.", error);
        }
      }

      scanner.hardwareZoom = await applyHardwareZoom(2);
      if (scanner.hardwareZoom) {
        video.style.transform = "scale(1)";
        zoomLabel.textContent = "2× HW";
      } else {
        applyCssZoom(true);
        zoomLabel.textContent = "1.8×";
      }

      if (capabilities.torch) {
        torchBtn.hidden = false;
      }
    }

    async function toggleZoom() {
      scanner.zoomed = !scanner.zoomed;
      zoomBtn.classList.toggle("active", scanner.zoomed);
      if (scanner.hardwareZoom) {
        await applyHardwareZoom(scanner.zoomed ? 2 : 1);
        zoomLabel.textContent = scanner.zoomed ? "2× HW" : "1×";
      } else {
        applyCssZoom(scanner.zoomed);
        zoomLabel.textContent = scanner.zoomed ? "1.8×" : "1×";
      }
    }

    async function toggleTorch() {
      if (!scanner.track) return;
      scanner.torchOn = !scanner.torchOn;
      try {
        await scanner.track.applyConstraints({ advanced: [{ torch: scanner.torchOn }] });
        torchBtn.classList.toggle("active", scanner.torchOn);
      } catch (error) {
        scanner.torchOn = false;
        torchBtn.classList.remove("active");
        showToast("Camera light is unavailable");
      }
    }

    zoomBtn.addEventListener("click", toggleZoom);
    torchBtn.addEventListener("click", toggleTorch);

    async function startCamera() {
      setStatus("Requesting camera…", "", "fa-solid fa-camera");
      var stream;
      try {
        stream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: { ideal: "environment" },
            width: { ideal: 1920 },
            height: { ideal: 1080 },
            frameRate: { ideal: 30, max: 30 }
          },
          audio: false
        });
      } catch (firstError) {
        stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: { ideal: "environment" } },
          audio: false
        });
      }

      video.srcObject = stream;
      scanner.track = stream.getVideoTracks()[0];
      await new Promise(function (resolve) {
        if (video.readyState >= 1) resolve();
        else video.onloadedmetadata = resolve;
      });
      await video.play();
      positionTarget();
      await initializeCameraFeatures();
    }

    function getCropRect() {
      var videoWidth = video.videoWidth;
      var videoHeight = video.videoHeight;
      var elementWidth = video.clientWidth;
      var elementHeight = video.clientHeight;
      if (!videoWidth || !videoHeight || !elementWidth || !elementHeight) return null;

      var videoAspect = videoWidth / videoHeight;
      var elementAspect = elementWidth / elementHeight;
      var sourceX = 0;
      var sourceY = 0;
      var sourceWidth = videoWidth;
      var sourceHeight = videoHeight;

      if (videoAspect > elementAspect) {
        sourceWidth = videoHeight * elementAspect;
        sourceX = (videoWidth - sourceWidth) / 2;
      } else {
        sourceHeight = videoWidth / elementAspect;
        sourceY = (videoHeight - sourceHeight) / 2;
      }

      var zoomFactor = scanner.zoomed && !scanner.hardwareZoom ? CSS_ZOOM : 1;
      var zoomWidth = sourceWidth / zoomFactor;
      var zoomHeight = sourceHeight / zoomFactor;
      sourceX += (sourceWidth - zoomWidth) / 2;
      sourceY += (sourceHeight - zoomHeight) / 2;

      var cropWidth = zoomWidth * BOX_WIDTH;
      var cropHeight = zoomHeight * BOX_HEIGHT;
      return {
        x: sourceX + (zoomWidth - cropWidth) / 2,
        y: sourceY + (zoomHeight - cropHeight) / 2,
        w: cropWidth,
        h: cropHeight
      };
    }

    function inspectFrame(rect) {
      var sampleWidth = 144;
      var sampleHeight = 32;
      qualityCanvas.width = sampleWidth;
      qualityCanvas.height = sampleHeight;
      qualityCtx.filter = "grayscale(1)";
      qualityCtx.drawImage(video, rect.x, rect.y, rect.w, rect.h, 0, 0, sampleWidth, sampleHeight);
      qualityCtx.filter = "none";

      var pixels = qualityCtx.getImageData(0, 0, sampleWidth, sampleHeight).data;
      var gray = new Uint8Array(sampleWidth * sampleHeight);
      var sum = 0;
      var edge = 0;
      var motion = 0;

      for (var i = 0; i < gray.length; i++) {
        var value = pixels[i * 4];
        gray[i] = value;
        sum += value;
        if (scanner.previousFrame) motion += Math.abs(value - scanner.previousFrame[i]);
      }

      for (var y = 1; y < sampleHeight; y++) {
        for (var x = 1; x < sampleWidth; x++) {
          var index = y * sampleWidth + x;
          edge += Math.abs(gray[index] - gray[index - 1]);
          edge += Math.abs(gray[index] - gray[index - sampleWidth]);
        }
      }

      scanner.previousFrame = gray;
      var mean = sum / gray.length;
      var sharpness = edge / ((sampleWidth - 1) * (sampleHeight - 1) * 2);
      var movement = scanner.previousFrame ? motion / gray.length : 0;
      var quality = clamp(Math.round((sharpness / 14) * 100), 0, 100);

      return {
        mean: mean,
        sharpness: sharpness,
        movement: movement,
        quality: quality,
        dark: mean < 42,
        bright: mean > 226,
        blurry: sharpness < 4.2,
        moving: motion > 0 && movement > 29
      };
    }

    function otsuThreshold(histogram, total) {
      var sum = 0;
      var sumBackground = 0;
      var weightBackground = 0;
      var bestVariance = -1;
      var threshold = 127;

      for (var i = 0; i < 256; i++) sum += i * histogram[i];
      for (var level = 0; level < 256; level++) {
        weightBackground += histogram[level];
        if (!weightBackground) continue;
        var weightForeground = total - weightBackground;
        if (!weightForeground) break;
        sumBackground += level * histogram[level];
        var meanBackground = sumBackground / weightBackground;
        var meanForeground = (sum - sumBackground) / weightForeground;
        var variance = weightBackground * weightForeground * Math.pow(meanBackground - meanForeground, 2);
        if (variance > bestVariance) {
          bestVariance = variance;
          threshold = level;
        }
      }
      return threshold;
    }

    function prepareOcrCanvas(rect, variant) {
      var width = clamp(Math.round(OCR_HEIGHT * (rect.w / rect.h)), 480, 940);
      ocrCanvas.width = width;
      ocrCanvas.height = OCR_HEIGHT;
      ocrCtx.imageSmoothingEnabled = true;
      ocrCtx.imageSmoothingQuality = "high";
      ocrCtx.filter = variant === "soft" ? "grayscale(1) contrast(1.7)" : "grayscale(1)";
      ocrCtx.drawImage(video, rect.x, rect.y, rect.w, rect.h, 0, 0, width, OCR_HEIGHT);
      ocrCtx.filter = "none";

      if (variant === "soft") return ocrCanvas;

      var image = ocrCtx.getImageData(0, 0, width, OCR_HEIGHT);
      var data = image.data;
      var histogram = new Uint32Array(256);
      var total = width * OCR_HEIGHT;
      var mean = 0;

      for (var i = 0; i < data.length; i += 4) {
        var gray = Math.round(0.299 * data[i] + 0.587 * data[i + 1] + 0.114 * data[i + 2]);
        histogram[gray]++;
        mean += gray;
      }

      mean /= total;
      var threshold = otsuThreshold(histogram, total);
      var invert = mean < 112;

      for (var p = 0; p < data.length; p += 4) {
        var pixel = Math.round(0.299 * data[p] + 0.587 * data[p + 1] + 0.114 * data[p + 2]);
        var binary = pixel > threshold ? 255 : 0;
        if (invert) binary = 255 - binary;
        data[p] = data[p + 1] = data[p + 2] = binary;
        data[p + 3] = 255;
      }

      ocrCtx.putImageData(image, 0, 0);
      ocrCtx.fillStyle = "#fff";
      ocrCtx.fillRect(0, 0, width, 3);
      ocrCtx.fillRect(0, OCR_HEIGHT - 3, width, 3);
      return ocrCanvas;
    }

    function normalizeDigits(text) {
      return String(text || "")
        .replace(/[\u0660-\u0669]/g, function (digit) { return String(digit.charCodeAt(0) - 1632); })
        .replace(/[\u06f0-\u06f9]/g, function (digit) { return String(digit.charCodeAt(0) - 1776); });
    }

    function canonicalPhone(raw) {
      var digits = normalizeDigits(raw).replace(/\D/g, "");
      var local = null;

      if (/^07\d{9}$/.test(digits)) {
        local = digits;
      } else if (/^9647\d{9}$/.test(digits)) {
        local = "0" + digits.slice(3);
      } else if (/^96407\d{9}$/.test(digits)) {
        local = digits.slice(3);
      } else if (/^009647\d{9}$/.test(digits)) {
        local = "0" + digits.slice(5);
      } else if (/^0096407\d{9}$/.test(digits)) {
        local = digits.slice(5);
      }

      if (!local) return null;
      return {
        local: local,
        international: "964" + local.slice(1),
        full: true
      };
    }

    function findPhoneCandidate(text) {
      var normalized = normalizeDigits(text);
      var lines = normalized.split(/\r?\n/);
      var fullPattern = /(?:00\s*964|\+?\s*964|0)\s*7(?:[\s\-().,/]*\d){9}/g;

      for (var i = 0; i < lines.length; i++) {
        var matches = lines[i].match(fullPattern) || [];
        for (var j = 0; j < matches.length; j++) {
          var full = canonicalPhone(matches[j]);
          if (full) return full;
        }
      }

      var partialPattern = /0\s*7(?:[\s\-().,/]*\d){6,8}/g;
      for (var lineIndex = 0; lineIndex < lines.length; lineIndex++) {
        var partials = lines[lineIndex].match(partialPattern) || [];
        if (partials.length) {
          var partialDigits = partials[0].replace(/\D/g, "").slice(0, 10);
          return {
            local: partialDigits,
            international: "",
            full: false
          };
        }
      }
      return null;
    }

    function chooseBetter(first, second) {
      if (!first) return second;
      if (!second) return first;
      if (second.candidate.full && !first.candidate.full) return second;
      if (first.candidate.full && !second.candidate.full) return first;
      if (second.candidate.local.length > first.candidate.local.length) return second;
      return second.confidence > first.confidence ? second : first;
    }

    async function ensureTesseract() {
      if (scanner.worker) return scanner.worker;
      if (scanner.workerPromise) return scanner.workerPromise;

      scanner.workerPromise = (async function () {
        if (!window.Tesseract) throw new Error("OCR engine failed to load");
        var worker = await Tesseract.createWorker("eng", 1, {
          logger: function (message) {
            if (message.status === "recognizing text" && !scanner.nativeDetector) {
              setStatus("Neural OCR " + Math.round((message.progress || 0) * 100) + "%", "", "fa-solid fa-atom");
            }
          }
        });
        await worker.setParameters({
          tessedit_char_whitelist: "0123456789+ -().",
          tessedit_pageseg_mode: "7",
          preserve_interword_spaces: "1",
          user_defined_dpi: "300"
        });
        scanner.worker = worker;
        return worker;
      })();

      try {
        return await scanner.workerPromise;
      } catch (error) {
        scanner.workerPromise = null;
        throw error;
      }
    }

    async function initializeEngine() {
      if ("TextDetector" in window) {
        try {
          scanner.nativeDetector = new TextDetector();
        } catch (error) {
          scanner.nativeDetector = null;
        }
      }

      if (scanner.nativeDetector) {
        engineLabel.textContent = "HYBRID AI";
        engineBadge.classList.add("ready");
        scanner.ready = true;
        setStatus("Point the number inside the frame", "", "fa-solid fa-crosshairs");
        ensureTesseract().catch(function (error) {
          console.info("Tesseract fallback was not initialized.", error);
        });
        return;
      }

      engineLabel.textContent = "LOADING OCR";
      setStatus("Loading digit model…", "", "fa-solid fa-atom");
      await ensureTesseract();
      engineLabel.textContent = "OCR v7 READY";
      engineBadge.classList.add("ready");
      scanner.ready = true;
      setStatus("Point the number inside the frame", "", "fa-solid fa-crosshairs");
    }

    async function scanNative(rect) {
      var width = clamp(Math.round(100 * (rect.w / rect.h)), 520, 940);
      nativeCanvas.width = width;
      nativeCanvas.height = 100;
      nativeCtx.drawImage(video, rect.x, rect.y, rect.w, rect.h, 0, 0, width, 100);
      var detections = await scanner.nativeDetector.detect(nativeCanvas);
      var best = null;

      for (var i = 0; i < detections.length; i++) {
        var candidate = findPhoneCandidate(detections[i].rawValue || "");
        if (!candidate) continue;
        if (!best || candidate.full || candidate.local.length > best.local.length) best = candidate;
      }

      return best ? { candidate: best, confidence: 92, engine: "native" } : null;
    }

    async function recognizeTesseract(rect) {
      var worker = await ensureTesseract();
      var started = performance.now();
      prepareOcrCanvas(rect, "binary");
      var primaryData = (await worker.recognize(ocrCanvas)).data;
      var primaryCandidate = findPhoneCandidate(primaryData.text);
      var best = primaryCandidate ? {
        candidate: primaryCandidate,
        confidence: Number(primaryData.confidence) || 0,
        engine: "tesseract"
      } : null;

      var needsFallback = !best || !best.candidate.full || best.confidence < 56;
      if (needsFallback) {
        prepareOcrCanvas(rect, "soft");
        var fallbackData = (await worker.recognize(ocrCanvas)).data;
        var fallbackCandidate = findPhoneCandidate(fallbackData.text);
        var fallback = fallbackCandidate ? {
          candidate: fallbackCandidate,
          confidence: Number(fallbackData.confidence) || 0,
          engine: "tesseract"
        } : null;
        best = chooseBetter(best, fallback);
      }

      latencyMetric.textContent = Math.round(performance.now() - started) + "ms";
      return best;
    }

    function updateCandidateDisplay(candidate, score, votes) {
      if (scanner.confirmed && scanner.confirmed.local === candidate.local) return;
      scanner.lastCandidate = candidate;
      scanner.lastConfidence = score;
      result.textContent = candidate.local;
      result.className = "candidate";
      resultCard.classList.remove("verified");
      target.classList.remove("verified");
      target.classList.add("locking");
      setConfidence(score);
      voteMetric.textContent = votes + "/" + REQUIRED_VOTES;
      setStatus(
        candidate.full ? "AI verification " + votes + "/" + REQUIRED_VOTES + " — hold steady" : "Reading remaining digits…",
        "warn",
        "fa-solid fa-fingerprint"
      );
    }

    function setActionLink(element, href) {
      element.href = href;
      element.classList.remove("disabled");
      element.setAttribute("aria-disabled", "false");
    }

    function confirmNumber(candidate, score) {
      var changed = !scanner.confirmed || scanner.confirmed.local !== candidate.local;
      scanner.confirmed = candidate;
      scanner.lastCandidate = candidate;
      scanner.lastConfidence = score;

      result.textContent = candidate.local;
      result.className = "verified";
      resultCard.classList.add("verified");
      target.classList.remove("locking");
      target.classList.add("verified");
      setConfidence(Math.max(score, 92));
      voteMetric.textContent = REQUIRED_VOTES + "/" + REQUIRED_VOTES;
      setStatus("Number verified and ready", "success", "fa-solid fa-circle-check");

      setActionLink(callAction, "tel:" + candidate.local);
      setActionLink(whatsappAction, "https://wa.me/" + candidate.international);
      setActionLink(viberAction, "viber://keypad?number=" + candidate.international);
      copyAction.classList.remove("disabled");
      copyAction.disabled = false;

      if (changed) {
        if (navigator.vibrate) navigator.vibrate([45, 35, 90]);
        showToast("Verified " + candidate.local);
      }
    }

    function registerRecognition(reading) {
      if (!reading || !reading.candidate) {
        if (!scanner.confirmed) {
          target.classList.remove("locking");
          setConfidence(0);
          voteMetric.textContent = "0/" + REQUIRED_VOTES;
        }
        return;
      }

      var candidate = reading.candidate;
      var score = reading.engine === "native" ? 92 : reading.confidence;
      if (!candidate.full) {
        updateCandidateDisplay(candidate, score, 0);
        return;
      }

      if (reading.engine === "tesseract" && score < MIN_TESS_CONFIDENCE) {
        updateCandidateDisplay(candidate, score, 0);
        return;
      }

      var now = Date.now();
      scanner.votes = scanner.votes.filter(function (vote) {
        return now - vote.time <= VOTE_WINDOW_MS;
      });
      scanner.votes.push({ number: candidate.local, confidence: score, time: now });

      var matching = scanner.votes.filter(function (vote) {
        return vote.number === candidate.local;
      });
      var count = Math.min(matching.length, REQUIRED_VOTES);
      var average = matching.reduce(function (sum, vote) {
        return sum + vote.confidence;
      }, 0) / matching.length;

      if (count >= REQUIRED_VOTES) confirmNumber(candidate, average);
      else updateCandidateDisplay(candidate, average, count);
    }

    function resetScanner() {
      scanner.votes = [];
      scanner.confirmed = null;
      scanner.lastCandidate = null;
      scanner.lastConfidence = 0;
      result.textContent = "07•• ••• ••••";
      result.className = "";
      resultCard.classList.remove("verified");
      target.classList.remove("locking", "verified");
      setConfidence(0);
      voteMetric.textContent = "0/" + REQUIRED_VOTES;
      setStatus("Point the number inside the frame", "", "fa-solid fa-crosshairs");

      [callAction, whatsappAction, viberAction].forEach(function (action) {
        action.removeAttribute("href");
        action.classList.add("disabled");
        action.setAttribute("aria-disabled", "true");
      });
      copyAction.classList.add("disabled");
      copyAction.disabled = true;
    }

    clearBtn.addEventListener("click", resetScanner);
    copyAction.addEventListener("click", async function () {
      if (!scanner.confirmed) return;
      try {
        await navigator.clipboard.writeText(scanner.confirmed.local);
        showToast("Number copied");
      } catch (error) {
        showToast("Copy permission was blocked");
      }
    });

    [callAction, whatsappAction, viberAction].forEach(function (action) {
      action.addEventListener("click", function (event) {
        if (!scanner.confirmed) event.preventDefault();
      });
    });

    async function scanOnce() {
      if (!scanner.ready || scanner.busy || document.hidden) return;
      var rect = getCropRect();
      if (!rect) return;

      var frame = inspectFrame(rect);
      qualityMetric.textContent = frame.quality + "%";

      if (frame.dark) {
        setStatus("Too dark — add light or use the flash", "warn", "fa-solid fa-moon");
        return;
      }
      if (frame.bright) {
        setStatus("Too much glare — tilt the camera", "warn", "fa-solid fa-sun");
        return;
      }
      if (frame.moving) {
        setStatus("Hold the camera steady", "warn", "fa-solid fa-hand");
        return;
      }
      if (frame.blurry) {
        setStatus("Move closer and let the camera focus", "warn", "fa-solid fa-wand-magic-sparkles");
        return;
      }

      scanner.busy = true;
      var reading = null;
      try {
        if (scanner.nativeDetector) {
          reading = await scanNative(rect);
          if (reading) scanner.nativeMisses = 0;
          else scanner.nativeMisses++;

          if (!reading && scanner.worker && scanner.nativeMisses % 4 === 0) {
            reading = await recognizeTesseract(rect);
          }
        } else {
          reading = await recognizeTesseract(rect);
        }
        registerRecognition(reading);
      } catch (error) {
        console.error(error);
        setStatus("Recognition paused — retrying", "warn", "fa-solid fa-triangle-exclamation");
      } finally {
        scanner.busy = false;
      }
    }

    function scheduleScan() {
      var delay = scanner.confirmed ? 850 : 170;
      setTimeout(function () {
        if (typeof video.requestVideoFrameCallback === "function") {
          video.requestVideoFrameCallback(function () {
            scanOnce().finally(scheduleScan);
          });
        } else {
          scanOnce().finally(scheduleScan);
        }
      }, delay);
    }

    function runParserSelfTest() {
      var cases = [
        ["0750 123 4567", "07501234567"],
        ["+964 750 123 4567", "07501234567"],
        ["00964 750 123 4567", "07501234567"],
        ["٠٧٥٠ ١٢٣ ٤٥٦٧", "07501234567"],
        ["۰۷۵۰ ۱۲۳ ۴۵۶۷", "07501234567"]
      ];

      cases.forEach(function (testCase) {
        var found = findPhoneCandidate(testCase[0]);
        console.assert(found && found.local === testCase[1], "Parser test failed:", testCase[0]);
      });
    }

    async function boot() {
      runParserSelfTest();
      try {
        await startCamera();
        await initializeEngine();
        scheduleScan();
      } catch (error) {
        console.error(error);
        engineLabel.textContent = "CAMERA ERROR";
        engineBadge.classList.add("error");
        setStatus(error.message || "Camera access failed", "warn", "fa-solid fa-triangle-exclamation");
      }
    }

    window.addEventListener("beforeunload", function () {
      if (scanner.worker) scanner.worker.terminate();
      if (scanner.track) scanner.track.stop();
    });

    boot();
  </script>
</body>
