<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Iraqi Scanner</title>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet"/>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}

    body{
      background:#080810;color:#fff;
      font-family:'Inter',sans-serif;
      height:100dvh;display:flex;flex-direction:column;align-items:center;overflow:hidden
    }

    /* ── header ── */
    #header{
      width:100%;max-width:540px;
      display:flex;align-items:center;justify-content:center;
      gap:8px;padding:12px 16px 8px;
      border-bottom:1px solid rgba(255,255,255,.06)
    }
    #header svg{flex-shrink:0}
    #header h1{
      font-size:.78rem;font-weight:600;letter-spacing:3px;
      text-transform:uppercase;
      background:linear-gradient(90deg,#a78bfa,#60a5fa);
      -webkit-background-clip:text;-webkit-text-fill-color:transparent
    }

    /* ── camera ── */
    #wrap{position:relative;width:100%;max-width:540px;flex:1;overflow:hidden;background:#000}
    #video{width:100%;height:100%;object-fit:cover}

    /* dimmed overlay done with SVG-mask approach via box-shadow */
    #box{
      position:absolute;pointer-events:none;
      border-radius:10px;
      border:2px solid rgba(167,139,250,.7);
      box-shadow:0 0 0 9999px rgba(0,0,0,.55);
      transition:border-color .25s,box-shadow .25s
    }
    #box.hit{
      border-color:#34d399;
      box-shadow:0 0 0 9999px rgba(0,0,0,.55),0 0 28px rgba(52,211,153,.6)
    }

    /* corner ticks */
    .c{position:absolute;width:18px;height:18px;border-style:solid;border-color:inherit;border-radius:2px}
    .tl{top:-2px;left:-2px;border-width:3px 0 0 3px}
    .tr{top:-2px;right:-2px;border-width:3px 3px 0 0}
    .bl{bottom:-2px;left:-2px;border-width:0 0 3px 3px}
    .br{bottom:-2px;right:-2px;border-width:0 3px 3px 0}

    /* scan sweep line */
    #line{
      position:absolute;left:6px;right:6px;height:1.5px;
      background:linear-gradient(90deg,transparent,rgba(167,139,250,.9),transparent);
      filter:blur(.5px);
      animation:sweep 1.1s ease-in-out infinite
    }
    @keyframes sweep{
      0%{top:6px;opacity:0}
      10%{opacity:1}
      90%{opacity:1}
      100%{top:calc(100% - 6px);opacity:0}
    }

    /* status pill */
    #status-pill{
      position:absolute;bottom:14px;left:50%;transform:translateX(-50%);
      background:rgba(10,10,20,.75);backdrop-filter:blur(8px);
      border:1px solid rgba(255,255,255,.1);border-radius:20px;
      font-size:.7rem;letter-spacing:1px;color:#94a3b8;
      padding:5px 14px;white-space:nowrap;pointer-events:none;
      transition:all .25s
    }
    #status-pill.hit-pill{
      background:rgba(52,211,153,.15);
      border-color:rgba(52,211,153,.4);color:#34d399
    }

    /* engine badge */
    #badge{
      position:absolute;top:10px;left:10px;
      background:rgba(10,10,20,.7);backdrop-filter:blur(6px);
      border:1px solid rgba(255,255,255,.08);border-radius:20px;
      font-size:.58rem;padding:4px 10px;color:#64748b;letter-spacing:1px
    }

    /* ── bottom panel ── */
    #panel{
      width:100%;max-width:540px;
      background:linear-gradient(180deg,#0e0e1a 0%,#0a0a14 100%);
      border-top:1px solid rgba(255,255,255,.06);
      padding:14px 16px 16px;display:flex;flex-direction:column;gap:12px
    }

    /* number display card */
    #num-card{
      background:rgba(255,255,255,.03);
      border:1px solid rgba(255,255,255,.07);
      border-radius:12px;padding:12px 14px;
      display:flex;align-items:center;gap:10px
    }
    #result{
      flex:1;font-family:'JetBrains Mono',monospace;
      font-size:1.45rem;font-weight:700;letter-spacing:2px;
      background:linear-gradient(90deg,#a78bfa,#60a5fa);
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;
      min-height:1.8rem;
    }
    #result.empty{
      -webkit-text-fill-color:#2d2d45;
      background:none;font-size:1rem;letter-spacing:0;font-weight:400
    }
    #copy-btn{
      background:rgba(167,139,250,.12);
      border:1px solid rgba(167,139,250,.25);
      color:#a78bfa;padding:8px 16px;
      border-radius:8px;font-size:.78rem;font-weight:600;
      cursor:pointer;transition:background .2s
    }
    #copy-btn:active{background:rgba(167,139,250,.25)}

    /* raw debug */
    #raw{font-size:.6rem;color:#2a2a3a;font-family:monospace;word-break:break-all;min-height:12px;padding:0 2px}

    /* call button */
    #call-btn{
      display:flex;align-items:center;justify-content:center;gap:8px;
      width:100%;padding:15px;
      background:linear-gradient(135deg,#059669,#34d399);
      color:#fff;font-weight:700;font-size:1rem;
      border:none;border-radius:12px;cursor:pointer;
      text-align:center;text-decoration:none;letter-spacing:.5px;
      box-shadow:0 4px 20px rgba(52,211,153,.25);
      transition:opacity .2s,transform .1s
    }
    #call-btn:active{transform:scale(.98);opacity:.9}
    #call-btn.off{
      background:rgba(255,255,255,.04);
      border:1px solid rgba(255,255,255,.07);
      color:#2d2d45;pointer-events:none;box-shadow:none
    }

    canvas{display:none}
  </style>
</head>
<body>
<div id="header">
  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="url(#g)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#a78bfa"/><stop offset="100%" stop-color="#60a5fa"/></linearGradient></defs>
    <path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 10.8 19.79 19.79 0 01.1 2.18 2 2 0 012.08 0h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.09 7.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/>
  </svg>
  <h1>Iraqi Number Scanner</h1>
</div>

<div id="wrap">
  <video id="video" autoplay playsinline muted></video>
  <div id="box">
    <div class="c tl"></div><div class="c tr"></div>
    <div class="c bl"></div><div class="c br"></div>
    <div id="line"></div>
  </div>
  <div id="badge">—</div>
  <div id="status-pill">Starting…</div>
</div>

<div id="panel">
  <div id="num-card">
    <div id="result" class="empty">waiting for number…</div>
    <button id="copy-btn" onclick="copyNum()">Copy</button>
  </div>
  <div id="raw"></div>
  <a id="call-btn" class="off" href="#">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 10.8 19.79 19.79 0 01.1 2.18 2 2 0 012.08 0h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.09 7.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/></svg>
    Call
  </a>
</div>
<canvas id="canvas"></canvas>

<script>
// ── Iraqi number pattern ──────────────────────────────────
// 07X XXXXXXXX  (11 digits, starts with 07, spaces/dashes allowed)
const IRAQI_FULL = /\b07[\s\-]?\d[\s\-]?\d{3}[\s\-]?\d{4}\b/;
const DIGIT_ONLY = s => s.replace(/[^\d]/g,'');

function findIraqiNumber(text) {
  // try compact first (no spaces)
  const compact = text.replace(/\s+/g,'');
  let m = compact.match(/07\d{9}/);
  if (m) return m[0];
  // try with separators
  m = text.match(IRAQI_FULL);
  if (m) { const n = DIGIT_ONLY(m[0]); return n.length===11 ? n : null; }
  return null;
}

// ── DOM ───────────────────────────────────────────────────
const video  = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx    = canvas.getContext('2d');
const box    = document.getElementById('box');
const badge  = document.getElementById('badge');
const status = document.getElementById('status-pill');
const rawEl  = document.getElementById('raw');
const result = document.getElementById('result');
const callBtn= document.getElementById('call-btn');

let lastNum='', looping=false, ready=false;
let useNative = false, nativeDetector = null, tessWorker = null;

// ── Scan box position (display) ───────────────────────────
const BW=.88, BH=.20;
function posBox(){
  const ew=video.offsetWidth, eh=video.offsetHeight;
  const bw=ew*BW, bh=eh*BH, bx=(ew-bw)/2, by=(eh-bh)/2;
  Object.assign(box.style,{left:bx+'px',top:by+'px',width:bw+'px',height:bh+'px'});
}
window.addEventListener('resize', posBox);

// ── Camera ────────────────────────────────────────────────
async function startCamera(){
  status.textContent='Camera…';
  let stream;
  try{ stream=await navigator.mediaDevices.getUserMedia({
    video:{facingMode:{ideal:'environment'},width:{ideal:1920},height:{ideal:1080}},audio:false}); }
  catch(_){ stream=await navigator.mediaDevices.getUserMedia({video:true,audio:false}); }
  video.srcObject=stream;
  await new Promise(r=>{ video.onloadedmetadata=r; });
  posBox();
}

// ── Engine init ───────────────────────────────────────────
async function initEngine(){
  // 1. Try native TextDetector (Chrome on Android — uses Google ML Kit)
  if('TextDetector' in window){
    try{
      nativeDetector = new TextDetector();
      // quick smoke test
      await nativeDetector.detect(video);
      useNative = true;
      badge.textContent = '⚡ NATIVE OCR';
      badge.style.color = '#00e676';
      status.textContent = 'Point at number';
      ready = true;
      return;
    }catch(e){ console.warn('TextDetector failed:', e); }
  }

  // 2. Fallback: Tesseract.js
  badge.textContent = 'TESSERACT';
  status.textContent = 'Loading OCR engine…';
  tessWorker = await Tesseract.createWorker('eng',1,{logger:()=>{}});
  await tessWorker.setParameters({
    tessedit_char_whitelist:'0123456789',
    tessedit_pageseg_mode:'7',
  });
  ready = true;
  badge.textContent = 'TESSERACT OCR';
  status.textContent = 'Point at number';
}

// ── Correct video crop for object-fit:cover ───────────────
function getCropRect(){
  const vw=video.videoWidth, vh=video.videoHeight;
  const ew=video.offsetWidth, eh=video.offsetHeight;
  if(!vw||!vh) return null;
  const vAR=vw/vh, eAR=ew/eh;
  let sx=0,sy=0,sw=vw,sh=vh;
  if(vAR>eAR){ sw=Math.round(vh*eAR); sx=Math.round((vw-sw)/2); }
  else        { sh=Math.round(vw/eAR); sy=Math.round((vh-sh)/2); }
  const bw=sw*BW, bh=sh*BH;
  return { x:sx+(sw-bw)/2, y:sy+(sh-bh)/2, w:bw, h:bh };
}

// ── Preprocess canvas for Tesseract ──────────────────────
function preprocess(sw, sh){
  const id = ctx.getImageData(0,0,sw,sh);
  const d  = id.data;
  let sum=0;
  for(let i=0;i<d.length;i+=4)
    sum += 0.299*d[i]+0.587*d[i+1]+0.114*d[i+2];
  const avg = sum/(d.length/4);
  const dark = avg<128;
  for(let i=0;i<d.length;i+=4){
    const g=0.299*d[i]+0.587*d[i+1]+0.114*d[i+2];
    const out = dark ? (g>avg?0:255) : (g<avg?0:255);
    d[i]=d[i+1]=d[i+2]=out; d[i+3]=255;
  }
  ctx.putImageData(id,0,0);
}

// ── Scan: native path ─────────────────────────────────────
async function scanNative(){
  // detect on FULL video frame — no crop needed, ML finds all text
  const detections = await nativeDetector.detect(video);
  const allText = detections.map(d=>d.rawValue).join(' ');
  rawEl.textContent = 'raw: '+allText.slice(0,80);
  return findIraqiNumber(allText);
}

// ── Scan: Tesseract path ──────────────────────────────────
async function scanTess(){
  const r = getCropRect();
  if(!r) return null;
  const SCALE=4;
  const sw=Math.round(r.w*SCALE), sh=Math.round(r.h*SCALE);
  canvas.width=sw; canvas.height=sh;
  ctx.drawImage(video, r.x, r.y, r.w, r.h, 0, 0, sw, sh);
  preprocess(sw, sh);
  const {data:{text}} = await tessWorker.recognize(canvas);
  rawEl.textContent = 'raw: '+text.replace(/\n/g,' ').slice(0,80);
  return findIraqiNumber(text);
}

// ── Loop ──────────────────────────────────────────────────
async function loop(){
  if(looping||!ready) return;
  looping=true;
  try{
    const num = useNative ? await scanNative() : await scanTess();
    if(num){
      box.className='hit';
      status.className='hit-pill';
      status.textContent='✓ Number detected';
      if(num!==lastNum){
        lastNum=num;
        setResult(num);
        navigator.vibrate&&navigator.vibrate([80,40,80]);
      }
    } else {
      box.className='';
      status.className='';
      status.textContent='Scanning…';
    }
  }catch(e){
    status.textContent='Err: '+e.message;
    console.error(e);
  }
  looping=false;
  // native is fast → 300ms; tesseract slower → 400ms
  setTimeout(loop, useNative?300:400);
}

// ── Result ────────────────────────────────────────────────
function setResult(num){
  result.textContent=num;
  result.classList.remove('empty');
  callBtn.href='tel:'+num;
  callBtn.innerHTML=`<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 10.8 19.79 19.79 0 01.1 2.18 2 2 0 012.08 0h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.09 7.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/></svg> Call ${num}`;
  callBtn.classList.remove('off');
  navigator.clipboard.writeText(num).catch(()=>{});
}
function copyNum(){
  if(!lastNum)return;
  navigator.clipboard.writeText(lastNum).then(()=>{
    const b=document.getElementById('copy-btn');
    b.textContent='✓ Copied'; setTimeout(()=>b.textContent='Copy',1400);
  });
}

// ── Boot ──────────────────────────────────────────────────
(async()=>{
  try{
    await startCamera();
    await initEngine();
    loop();
  }catch(e){
    status.textContent=e.message||'Failed';
    console.error(e);
  }
})();
</script>
</body>
</html>
