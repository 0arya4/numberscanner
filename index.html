<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Iraqi Scanner</title>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@800&display=swap" rel="stylesheet"/>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}

    body{
      background:#0a0500;color:#fff;
      font-family:'Inter',sans-serif;
      height:100dvh;display:flex;flex-direction:column;align-items:center;overflow:hidden
    }

    /* ── header ── */
    #header{
      width:100%;max-width:540px;
      display:flex;align-items:center;justify-content:space-between;
      padding:11px 16px 10px;
      border-bottom:1px solid rgba(255,255,255,.05)
    }
    #header-left{display:flex;align-items:center;gap:7px}
    #header h1{
      font-size:.72rem;font-weight:700;letter-spacing:3.5px;
      text-transform:uppercase;color:#f97316
    }
    #badge{
      font-size:.55rem;padding:3px 9px;border-radius:20px;
      background:rgba(249,115,22,.1);border:1px solid rgba(249,115,22,.3);
      color:#f97316;letter-spacing:1px;font-weight:600
    }
    #sr-badge{
      font-size:.5rem;padding:2px 7px;border-radius:20px;
      background:rgba(168,85,247,.12);border:1px solid rgba(168,85,247,.3);
      color:#c084fc;letter-spacing:1px;font-weight:600;display:none
    }

    /* ── camera wrap ── */
    #wrap{position:relative;width:100%;max-width:540px;flex:1;overflow:hidden;background:#000}
    #video{
      width:100%;height:100%;object-fit:cover;
      transform-origin:center center;
      transition:transform .4s ease
    }

    /* ── scan box ── */
    #box{
      position:absolute;pointer-events:none;
      border-radius:10px;
      border:2px solid rgba(249,115,22,.7);
      box-shadow:0 0 0 9999px rgba(0,0,0,.62);
      transition:border-color .2s,box-shadow .2s
    }
    #box.hit{
      border-color:#4ade80;
      box-shadow:0 0 0 9999px rgba(0,0,0,.5),0 0 28px rgba(74,222,128,.5)
    }

    /* corner ticks */
    .c{position:absolute;width:20px;height:20px;border-style:solid;border-color:inherit;border-radius:2px}
    .tl{top:-2px;left:-2px;border-width:3px 0 0 3px}
    .tr{top:-2px;right:-2px;border-width:3px 3px 0 0}
    .bl{bottom:-2px;left:-2px;border-width:0 0 3px 3px}
    .br{bottom:-2px;right:-2px;border-width:0 3px 3px 0}

    /* scan sweep */
    #line{
      position:absolute;left:6px;right:6px;height:2px;
      background:linear-gradient(90deg,transparent,#f97316,transparent);
      filter:blur(.5px);
      animation:sweep 1.3s ease-in-out infinite
    }
    #box.hit #line{background:linear-gradient(90deg,transparent,#4ade80,transparent)}
    @keyframes sweep{
      0%{top:4px;opacity:0}12%{opacity:1}88%{opacity:1}100%{top:calc(100% - 4px);opacity:0}
    }

    /* zoom pill top-right */
    #zoom-pill{
      position:absolute;top:12px;right:12px;
      background:rgba(10,5,0,.8);backdrop-filter:blur(8px);
      border:1px solid rgba(249,115,22,.3);border-radius:20px;
      color:#f97316;font-size:.65rem;font-weight:700;letter-spacing:1px;
      padding:5px 12px;cursor:pointer;user-select:none;
      transition:background .15s
    }
    #zoom-pill:active{background:rgba(249,115,22,.15)}

    /* SR pill top-left */
    #sr-pill{
      position:absolute;top:12px;left:12px;
      background:rgba(10,5,0,.8);backdrop-filter:blur(8px);
      border:1px solid rgba(168,85,247,.3);border-radius:20px;
      color:#c084fc;font-size:.6rem;font-weight:700;letter-spacing:.8px;
      padding:5px 10px;cursor:pointer;user-select:none;
      transition:background .15s
    }
    #sr-pill.active-pill{background:rgba(168,85,247,.15);border-color:rgba(168,85,247,.5)}
    #sr-pill:active{background:rgba(168,85,247,.2)}

    /* status pill */
    #status-pill{
      position:absolute;bottom:12px;left:50%;transform:translateX(-50%);
      background:rgba(10,5,0,.88);backdrop-filter:blur(10px);
      border:1px solid rgba(255,255,255,.08);border-radius:20px;
      font-size:.68rem;letter-spacing:1px;color:#64748b;
      padding:5px 16px;white-space:nowrap;pointer-events:none;
      transition:all .2s
    }
    #status-pill.hit-pill{background:rgba(74,222,128,.12);border-color:rgba(74,222,128,.35);color:#4ade80}
    #status-pill.partial-pill{background:rgba(249,115,22,.1);border-color:rgba(249,115,22,.3);color:#fb923c}
    #status-pill.sr-pill{background:rgba(168,85,247,.1);border-color:rgba(168,85,247,.3);color:#c084fc}

    /* ── bottom panel ── */
    #panel{
      width:100%;max-width:540px;
      background:#0f0700;
      border-top:1px solid rgba(255,255,255,.05);
      padding:14px 16px 18px;display:flex;flex-direction:column;gap:10px
    }

    /* number display */
    #num-card{
      background:rgba(255,255,255,.03);
      border:1px solid rgba(255,255,255,.06);
      border-radius:14px;padding:13px 14px;
      display:flex;align-items:center;gap:8px;
      transition:border-color .2s,background .2s
    }
    #num-card.active{background:rgba(74,222,128,.04);border-color:rgba(74,222,128,.2)}
    #num-card.partial-card{background:rgba(249,115,22,.04);border-color:rgba(249,115,22,.2)}

    #result{
      flex:1;font-family:'JetBrains Mono',monospace;
      font-size:1.45rem;font-weight:800;letter-spacing:2px;
      color:#f97316;min-height:1.8rem;transition:color .2s
    }
    #result.empty{color:#2a1500;font-size:.95rem;letter-spacing:0;font-weight:400;font-family:'Inter',sans-serif}
    #result.full{color:#4ade80}
    #result.partial{color:#fb923c}

    /* button group */
    #btn-group{display:flex;gap:7px;flex-shrink:0}

    /* copy btn */
    #copy-btn{
      background:rgba(249,115,22,.12);border:1px solid rgba(249,115,22,.3);
      color:#f97316;padding:9px 16px;border-radius:9px;
      font-size:.78rem;font-weight:700;cursor:pointer;
      transition:background .15s,transform .1s;white-space:nowrap
    }
    #copy-btn:active{background:rgba(249,115,22,.28);transform:scale(.96)}
    #copy-btn.done{background:rgba(74,222,128,.15);border-color:rgba(74,222,128,.3);color:#4ade80}

    /* clear btn */
    #clear-btn{
      background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);
      color:#475569;padding:9px 14px;border-radius:9px;
      font-size:.78rem;font-weight:700;cursor:pointer;
      transition:background .15s,transform .1s;white-space:nowrap
    }
    #clear-btn:active{background:rgba(255,255,255,.1);transform:scale(.96)}

    /* call button */
    #call-btn{
      display:flex;align-items:center;justify-content:center;gap:9px;
      width:100%;padding:16px;
      background:linear-gradient(135deg,#c2410c,#f97316);
      color:#fff;font-weight:700;font-size:1.05rem;
      border:none;border-radius:13px;cursor:pointer;
      text-align:center;text-decoration:none;letter-spacing:.4px;
      box-shadow:0 4px 24px rgba(249,115,22,.25);
      transition:opacity .2s,transform .1s
    }
    #call-btn:active{transform:scale(.98);opacity:.88}
    #call-btn.off{
      background:rgba(255,255,255,.03);
      border:1px solid rgba(255,255,255,.06);
      color:#1e1208;pointer-events:none;box-shadow:none
    }

    canvas{display:none}
  </style>
</head>
<body>

<div id="header">
  <div id="header-left">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#f97316" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 10.8 19.79 19.79 0 01.1 2.18 2 2 0 012.08 0h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.09 7.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/>
    </svg>
    <h1>Iraqi Scanner</h1>
  </div>
  <div style="display:flex;gap:6px;align-items:center">
    <div id="sr-badge">AI-SR</div>
    <div id="badge">—</div>
  </div>
</div>

<div id="wrap">
  <video id="video" autoplay playsinline muted></video>
  <div id="box">
    <div class="c tl"></div><div class="c tr"></div>
    <div class="c bl"></div><div class="c br"></div>
    <div id="line"></div>
  </div>
  <div id="zoom-pill" onclick="toggleZoom()">2×</div>
  <div id="sr-pill" onclick="toggleSR()" title="AI Super-Resolution">AI-SR</div>
  <div id="status-pill">Starting…</div>
</div>

<div id="panel">
  <div id="num-card">
    <div id="result" class="empty">point at a number…</div>
    <div id="btn-group">
      <button id="copy-btn" onclick="copyNum()">Copy</button>
      <button id="clear-btn" onclick="clearNum()">✕</button>
    </div>
  </div>
  <a id="call-btn" class="off" href="#">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 10.8 19.79 19.79 0 01.1 2.18 2 2 0 012.08 0h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.09 7.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/>
    </svg>
    Call
  </a>
</div>

<canvas id="canvas"></canvas>
<canvas id="canvas2" style="display:none"></canvas>

<script>
// ── number matching ──────────────────────────────────────────
function findNumber(text) {
  const d = text.replace(/(\d)[\s\-\.،,]+(\d)/g,'$1$2').replace(/[^0-9]/g,'');
  let m = d.match(/07\d{9}/);
  if (m) return { num: m[0], full: true };
  m = d.match(/07\d{6,8}/);
  if (m) return { num: m[0], full: false };
  return null;
}

// ── AI Super-Resolution: unsharp mask on greyscale canvas ────
// Sharpens edges blown up from low-res source — no network needed.
function applyUnsharpMask(ctx, w, h) {
  const id = ctx.getImageData(0, 0, w, h);
  const d  = id.data;
  // read single channel (greyscale so r=g=b)
  const src = new Uint8Array(w * h);
  for (let i = 0; i < w * h; i++) src[i] = d[i * 4];

  // 3×3 sharpening kernel  [−1 −1 −1]
  //                        [−1  9 −1]
  //                        [−1 −1 −1]
  for (let y = 1; y < h - 1; y++) {
    for (let x = 1; x < w - 1; x++) {
      const c = y * w + x;
      let v = 9 * src[c]
            - src[c - w - 1] - src[c - w] - src[c - w + 1]
            - src[c - 1]                   - src[c + 1]
            - src[c + w - 1] - src[c + w] - src[c + w + 1];
      v = v < 0 ? 0 : v > 255 ? 255 : v;
      const i = c * 4;
      d[i] = d[i+1] = d[i+2] = v;
    }
  }
  ctx.putImageData(id, 0, 0);
}

// ── DOM ──────────────────────────────────────────────────────
const video    = document.getElementById('video');
const canvas   = document.getElementById('canvas');
const canvas2  = document.getElementById('canvas2');
const ctx      = canvas.getContext('2d');
const ctx2     = canvas2.getContext('2d');
const box      = document.getElementById('box');
const badge    = document.getElementById('badge');
const srBadge  = document.getElementById('sr-badge');
const srPill   = document.getElementById('sr-pill');
const status   = document.getElementById('status-pill');
const result   = document.getElementById('result');
const numCard  = document.getElementById('num-card');
const callBtn  = document.getElementById('call-btn');
const copyBtn  = document.getElementById('copy-btn');
const zoomPill = document.getElementById('zoom-pill');

let lastFull = '', looping = false, ready = false;
let useNative = false, nativeDetector = null, tessWorker = null;
let videoTrack = null;
let hwZoom = false, cssZoomOn = true;
let cssScale = 2;
// AI-SR on by default — auto-enabled for low-res cameras
let srEnabled = true;

// ── scan-box layout ──────────────────────────────────────────
const BW = 0.95, BH = 0.19;
function posBox() {
  const ew = video.offsetWidth, eh = video.offsetHeight;
  const bw = ew * BW, bh = eh * BH, bx = (ew - bw) / 2, by = (eh - bh) / 2;
  Object.assign(box.style, { left:bx+'px', top:by+'px', width:bw+'px', height:bh+'px' });
}
window.addEventListener('resize', posBox);

// ── zoom ─────────────────────────────────────────────────────
async function applyHardwareZoom(level) {
  if (!videoTrack) return false;
  try {
    const caps = videoTrack.getCapabilities();
    if (!caps.zoom) return false;
    const target = Math.min(level, caps.zoom.max);
    await videoTrack.applyConstraints({ advanced: [{ zoom: target }] });
    return true;
  } catch(e) { return false; }
}
function applyCSSZoom(on) {
  video.style.transform = on ? `scale(${cssScale})` : 'scale(1)';
}
async function initZoom() {
  hwZoom = await applyHardwareZoom(2);
  if (hwZoom) {
    zoomPill.textContent = '2× HW';
    video.style.transform = 'scale(1)';
  } else {
    applyCSSZoom(true);
    zoomPill.textContent = '2×';
  }
  cssZoomOn = true;
}
async function toggleZoom() {
  cssZoomOn = !cssZoomOn;
  if (hwZoom) {
    await applyHardwareZoom(cssZoomOn ? 2 : 1);
    zoomPill.textContent = cssZoomOn ? '2× HW' : '1×';
  } else {
    applyCSSZoom(cssZoomOn);
    zoomPill.textContent = cssZoomOn ? '2×' : '1×';
  }
}

// ── AI-SR toggle ─────────────────────────────────────────────
function toggleSR() {
  srEnabled = !srEnabled;
  srPill.classList.toggle('active-pill', srEnabled);
  srBadge.style.display = srEnabled ? 'block' : 'none';
}
// init SR pill state
srPill.classList.add('active-pill');
srBadge.style.display = 'block';

// ── camera ───────────────────────────────────────────────────
async function startCamera() {
  status.textContent = 'Camera…';
  let stream;
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode:{ ideal:'environment' }, width:{ ideal:1920 }, height:{ ideal:1080 } },
      audio: false
    });
  } catch(_) {
    stream = await navigator.mediaDevices.getUserMedia({ video:true, audio:false });
  }
  video.srcObject = stream;
  videoTrack = stream.getVideoTracks()[0];
  await new Promise(r => { video.onloadedmetadata = r; });
  posBox();
  await initZoom();
}

// ── engine init ──────────────────────────────────────────────
async function initEngine() {
  if ('TextDetector' in window) {
    try {
      nativeDetector = new TextDetector();
      await nativeDetector.detect(video);
      useNative = true;
      badge.textContent = '⚡ INSTANT';
      status.textContent = 'Point at number';
      ready = true;
      return;
    } catch(e) { console.warn('TextDetector failed:', e); }
  }
  badge.textContent = 'LOADING…';
  status.textContent = 'Loading OCR…';
  tessWorker = await Tesseract.createWorker('eng', 1, { logger:()=>{} });
  await tessWorker.setParameters({
    tessedit_char_whitelist: '0123456789',
    tessedit_pageseg_mode: '7',
  });
  badge.textContent = 'OCR READY';
  status.textContent = 'Point at number';
  ready = true;
}

// ── correct crop rect (object-fit:cover + CSS zoom) ──────────
function getCropRect() {
  const vw = video.videoWidth, vh = video.videoHeight;
  const ew = video.offsetWidth,  eh = video.offsetHeight;
  if (!vw || !vh) return null;
  const zoomFactor = (cssZoomOn && !hwZoom) ? cssScale : 1;
  const vAR = vw / vh, eAR = ew / eh;
  let sx = 0, sy = 0, sw = vw, sh = vh;
  if (vAR > eAR) { sw = Math.round(vh * eAR); sx = Math.round((vw - sw) / 2); }
  else            { sh = Math.round(vw / eAR); sy = Math.round((vh - sh) / 2); }
  const zsw = sw / zoomFactor, zsh = sh / zoomFactor;
  sx += (sw - zsw) / 2; sy += (sh - zsh) / 2;
  const bw = zsw * BW, bh = zsh * BH;
  return { x: sx + (zsw - bw) / 2, y: sy + (zsh - bh) / 2, w: bw, h: bh };
}

// ── native scan ──────────────────────────────────────────────
async function scanNative() {
  const detections = await nativeDetector.detect(video);
  const allText = detections.map(d => d.rawValue).join(' ');
  return findNumber(allText);
}

// ── tesseract scan + AI-SR multi-pass ───────────────────────
// Tries up to 4 different blur/contrast combos and stops the
// moment a full 11-digit Iraqi number is confirmed.
// Worst-case ~2-3 s on bad quality; good quality exits in 1 pass.
async function scanTess() {
  const r = getCropRect();
  if (!r) return null;

  const camPx = video.videoWidth * video.videoHeight;
  const isLowRes = camPx < 1280 * 720;
  const SCALE = isLowRes ? 5 : 4;
  const sw = Math.round(r.w * SCALE), sh = Math.round(r.h * SCALE);

  // ── brightness sample ────────────────────────────────────
  canvas2.width = 80; canvas2.height = 20;
  ctx2.filter = 'none';
  ctx2.drawImage(video, r.x, r.y, r.w, r.h, 0, 0, 80, 20);
  const sample = ctx2.getImageData(0, 0, 80, 20).data;
  let bSum = 0;
  for (let i = 0; i < sample.length; i += 4)
    bSum += 0.299*sample[i] + 0.587*sample[i+1] + 0.114*sample[i+2];
  const dark = (bSum / 1600) < 118;

  // ── render one attempt to `canvas` ──────────────────────
  function render(blurPx, contrast, inv) {
    const mw = Math.round(r.w * 2), mh = Math.round(r.h * 2);
    canvas2.width = mw; canvas2.height = mh;
    // Step 1 – 2× + blur: kills moire / screen scanlines
    ctx2.filter = `grayscale(1) blur(${blurPx}px)`;
    ctx2.drawImage(video, r.x, r.y, r.w, r.h, 0, 0, mw, mh);
    ctx2.filter = 'none';
    // Step 2 – 2× more + heavy contrast
    canvas.width = sw; canvas.height = sh;
    ctx.filter = `contrast(${contrast})${inv ? ' invert(1)' : ''}`;
    ctx.drawImage(canvas2, 0, 0, sw, sh);
    ctx.filter = 'none';
    // Step 3 – AI unsharp mask: recovers edges blurred by upscale
    if (srEnabled && sw * sh < 2600000) applyUnsharpMask(ctx, sw, sh);
  }

  // ── pass schedule ────────────────────────────────────────
  // [blurPx, contrast, invert]
  // Different blur strengths hit different moire frequencies;
  // opposite polarity catches misdetected bg brightness.
  const passes = [
    [0.9, 7,  dark ],   // 1 – light blur, max contrast  (fast path)
    [1.5, 5,  dark ],   // 2 – medium blur kills more moire
    [0.9, 7, !dark ],   // 3 – opposite polarity
    [2.2, 4,  dark ],   // 4 – heavy blur, softer contrast (last resort)
  ];

  let best = null;
  let passN = 0;
  for (const [blur, contrast, inv] of passes) {
    passN++;
    status.className = srEnabled ? 'sr-pill' : 'partial-pill';
    status.textContent = passN === 1 ? 'Scanning…' : `AI pass ${passN}/4…`;

    render(blur, contrast, inv);
    const { data: { text } } = await tessWorker.recognize(canvas);
    const found = findNumber(text);

    if (found?.full) return found;                            // ✓ done early
    if (found && (!best || found.num.length > best.num.length)) best = found;
  }
  return best;
}

// ── apply result ─────────────────────────────────────────────
const PHONE_SVG = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 10.8 19.79 19.79 0 01.1 2.18 2 2 0 012.08 0h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.09 7.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/></svg>`;

function applyResult(found) {
  if (!found) {
    box.className = '';
    status.className = '';
    status.textContent = 'Scanning…';
    return;
  }
  const { num, full } = found;
  result.textContent = num;
  result.classList.remove('empty','full','partial');
  numCard.classList.remove('active','partial-card');

  if (full) {
    result.classList.add('full');
    numCard.classList.add('active');
    box.className = 'hit';
    status.className = 'hit-pill';
    status.textContent = '✓ Got it!';
    callBtn.href = 'tel:' + num;
    callBtn.innerHTML = `${PHONE_SVG} Call ${num}`;
    callBtn.classList.remove('off');
    if (num !== lastFull) {
      lastFull = num;
      navigator.clipboard.writeText(num).catch(()=>{});
      navigator.vibrate && navigator.vibrate([60,30,60]);
      flashCopy();
    }
  } else {
    result.classList.add('partial');
    numCard.classList.add('partial-card');
    box.className = '';
    status.className = 'partial-pill';
    status.textContent = 'Reading…';
  }
}

function flashCopy() {
  copyBtn.textContent = '✓ Copied';
  copyBtn.classList.add('done');
  setTimeout(()=>{ copyBtn.textContent='Copy'; copyBtn.classList.remove('done'); }, 1500);
}
function copyNum() {
  const num = result.textContent;
  if (!num || result.classList.contains('empty')) return;
  navigator.clipboard.writeText(num).then(()=>flashCopy()).catch(()=>{});
}
function clearNum() {
  lastFull = '';
  result.textContent = 'point at a number…';
  result.className = 'empty';
  numCard.className = '';
  box.className = '';
  status.className = '';
  status.textContent = 'Scanning…';
  callBtn.href = '#';
  callBtn.innerHTML = `${PHONE_SVG} Call`;
  callBtn.classList.add('off');
  copyBtn.textContent = 'Copy';
  copyBtn.classList.remove('done');
}

// ── main loop ────────────────────────────────────────────────
async function loop() {
  if (looping || !ready) return;
  looping = true;
  let found = null;
  try {
    found = useNative ? await scanNative() : await scanTess();
    applyResult(found);
  } catch(e) { console.error(e); }
  looping = false;
  // If we only have a partial number, retry faster to complete it
  const partial = found && !found.full;
  setTimeout(loop, useNative ? 200 : partial ? 300 : 500);
}

// ── boot ─────────────────────────────────────────────────────
(async () => {
  try {
    await startCamera();
    await initEngine();
    loop();
  } catch(e) {
    status.textContent = e.message || 'Failed to start';
    console.error(e);
  }
})();
</script>
</body>
</html>
