<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Iraqi Scanner</title>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@800&display=swap" rel="stylesheet"/>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}

    body{
      background:#06060f;color:#fff;
      font-family:'Inter',sans-serif;
      height:100dvh;display:flex;flex-direction:column;align-items:center;overflow:hidden
    }

    /* ── header ── */
    #header{
      width:100%;max-width:540px;
      display:flex;align-items:center;justify-content:space-between;
      padding:11px 16px 10px;
      border-bottom:1px solid rgba(255,255,255,.05)
    }
    #header-left{display:flex;align-items:center;gap:7px}
    #header h1{
      font-size:.72rem;font-weight:700;letter-spacing:3.5px;
      text-transform:uppercase;
      color:#f59e0b
    }
    #badge{
      font-size:.55rem;padding:3px 9px;border-radius:20px;
      background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.2);
      color:#f59e0b;letter-spacing:1px;font-weight:600
    }

    /* ── camera wrap ── */
    #wrap{position:relative;width:100%;max-width:540px;flex:1;overflow:hidden;background:#000}
    #video{width:100%;height:100%;object-fit:cover}

    /* ── scan box ── */
    #box{
      position:absolute;pointer-events:none;
      border-radius:10px;
      border:2px solid rgba(245,158,11,.6);
      box-shadow:0 0 0 9999px rgba(0,0,0,.6);
      transition:border-color .2s,box-shadow .2s
    }
    #box.hit{
      border-color:#22c55e;
      box-shadow:0 0 0 9999px rgba(0,0,0,.5),0 0 30px rgba(34,197,94,.55)
    }

    /* corner ticks */
    .c{position:absolute;width:20px;height:20px;border-style:solid;border-color:inherit;border-radius:2px}
    .tl{top:-2px;left:-2px;border-width:3px 0 0 3px}
    .tr{top:-2px;right:-2px;border-width:3px 3px 0 0}
    .bl{bottom:-2px;left:-2px;border-width:0 0 3px 3px}
    .br{bottom:-2px;right:-2px;border-width:0 3px 3px 0}

    /* scan sweep */
    #line{
      position:absolute;left:6px;right:6px;height:2px;
      background:linear-gradient(90deg,transparent,#f59e0b,transparent);
      filter:blur(.6px);
      animation:sweep 1s ease-in-out infinite
    }
    #box.hit #line{background:linear-gradient(90deg,transparent,#22c55e,transparent)}
    @keyframes sweep{
      0%{top:4px;opacity:0}12%{opacity:1}88%{opacity:1}100%{top:calc(100% - 4px);opacity:0}
    }

    /* status pill */
    #status-pill{
      position:absolute;bottom:12px;left:50%;transform:translateX(-50%);
      background:rgba(6,6,15,.8);backdrop-filter:blur(10px);
      border:1px solid rgba(255,255,255,.08);border-radius:20px;
      font-size:.68rem;letter-spacing:1px;color:#64748b;
      padding:5px 16px;white-space:nowrap;pointer-events:none;
      transition:all .2s
    }
    #status-pill.hit-pill{
      background:rgba(34,197,94,.12);
      border-color:rgba(34,197,94,.35);color:#22c55e
    }
    #status-pill.partial-pill{
      background:rgba(245,158,11,.1);
      border-color:rgba(245,158,11,.3);color:#f59e0b
    }

    /* ── bottom panel ── */
    #panel{
      width:100%;max-width:540px;
      background:#0a0a14;
      border-top:1px solid rgba(255,255,255,.05);
      padding:14px 16px 18px;display:flex;flex-direction:column;gap:10px
    }

    /* number display */
    #num-card{
      background:rgba(255,255,255,.03);
      border:1px solid rgba(255,255,255,.06);
      border-radius:14px;padding:13px 14px;
      display:flex;align-items:center;gap:10px;
      transition:border-color .2s,background .2s
    }
    #num-card.active{
      background:rgba(34,197,94,.04);
      border-color:rgba(34,197,94,.2)
    }
    #num-card.partial-card{
      background:rgba(245,158,11,.04);
      border-color:rgba(245,158,11,.2)
    }
    #result{
      flex:1;font-family:'JetBrains Mono',monospace;
      font-size:1.5rem;font-weight:800;letter-spacing:2px;
      color:#f59e0b;
      min-height:1.8rem;transition:color .2s
    }
    #result.empty{color:#1e1e30;font-size:.95rem;letter-spacing:0;font-weight:400;font-family:'Inter',sans-serif}
    #result.full{color:#22c55e}
    #result.partial{color:#f59e0b}

    /* copy btn */
    #copy-btn{
      background:rgba(245,158,11,.12);
      border:1px solid rgba(245,158,11,.25);
      color:#f59e0b;padding:9px 18px;
      border-radius:9px;font-size:.78rem;font-weight:700;
      cursor:pointer;transition:background .15s,transform .1s;
      white-space:nowrap
    }
    #copy-btn:active{background:rgba(245,158,11,.3);transform:scale(.96)}
    #copy-btn.done{background:rgba(34,197,94,.15);border-color:rgba(34,197,94,.3);color:#22c55e}

    /* call button */
    #call-btn{
      display:flex;align-items:center;justify-content:center;gap:9px;
      width:100%;padding:16px;
      background:linear-gradient(135deg,#15803d,#22c55e);
      color:#fff;font-weight:700;font-size:1.05rem;
      border:none;border-radius:13px;cursor:pointer;
      text-align:center;text-decoration:none;letter-spacing:.4px;
      box-shadow:0 4px 24px rgba(34,197,94,.22);
      transition:opacity .2s,transform .1s
    }
    #call-btn:active{transform:scale(.98);opacity:.88}
    #call-btn.off{
      background:rgba(255,255,255,.03);
      border:1px solid rgba(255,255,255,.06);
      color:#1e1e30;pointer-events:none;box-shadow:none
    }

    canvas{display:none}
  </style>
</head>
<body>

<div id="header">
  <div id="header-left">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#f59e0b" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/>
    </svg>
    <h1>Iraqi Scanner</h1>
  </div>
  <div id="badge">—</div>
</div>

<div id="wrap">
  <video id="video" autoplay playsinline muted></video>
  <div id="box">
    <div class="c tl"></div><div class="c tr"></div>
    <div class="c bl"></div><div class="c br"></div>
    <div id="line"></div>
  </div>
  <div id="status-pill">Starting…</div>
</div>

<div id="panel">
  <div id="num-card">
    <div id="result" class="empty">point at a number…</div>
    <button id="copy-btn" onclick="copyNum()">Copy</button>
  </div>
  <a id="call-btn" class="off" href="#">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 10.8 19.79 19.79 0 01.1 2.18 2 2 0 012.08 0h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.09 7.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/>
    </svg>
    Call
  </a>
</div>

<canvas id="canvas"></canvas>

<script>
// ── number matching ──────────────────────────────────────────
function findNumber(text) {
  // strip everything except digits
  const d = text.replace(/[^0-9]/g, '');
  // full Iraqi number: 11 digits starting with 07
  let m = d.match(/07\d{9}/);
  if (m) return { num: m[0], full: true };
  // partial: at least 07 + 6 more digits → show as preview
  m = d.match(/07\d{6,8}/);
  if (m) return { num: m[0], full: false };
  return null;
}

// ── DOM ──────────────────────────────────────────────────────
const video   = document.getElementById('video');
const canvas  = document.getElementById('canvas');
const ctx     = canvas.getContext('2d');
const box     = document.getElementById('box');
const badge   = document.getElementById('badge');
const status  = document.getElementById('status-pill');
const result  = document.getElementById('result');
const numCard = document.getElementById('num-card');
const callBtn = document.getElementById('call-btn');
const copyBtn = document.getElementById('copy-btn');

let lastFull = '', looping = false, ready = false;
let useNative = false, nativeDetector = null, tessWorker = null;

// ── scan-box layout ──────────────────────────────────────────
const BW = 0.90, BH = 0.19;
function posBox() {
  const ew = video.offsetWidth, eh = video.offsetHeight;
  const bw = ew * BW, bh = eh * BH, bx = (ew - bw) / 2, by = (eh - bh) / 2;
  Object.assign(box.style, { left: bx+'px', top: by+'px', width: bw+'px', height: bh+'px' });
}
window.addEventListener('resize', posBox);

// ── camera ───────────────────────────────────────────────────
async function startCamera() {
  status.textContent = 'Camera…';
  let stream;
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: 'environment' }, width: { ideal: 1920 }, height: { ideal: 1080 } },
      audio: false
    });
  } catch(_) {
    stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
  }
  video.srcObject = stream;
  await new Promise(r => { video.onloadedmetadata = r; });
  posBox();
}

// ── engine init ──────────────────────────────────────────────
async function initEngine() {
  // Try native TextDetector first (Chrome Android — instant ML Kit)
  if ('TextDetector' in window) {
    try {
      nativeDetector = new TextDetector();
      await nativeDetector.detect(video);  // smoke test
      useNative = true;
      badge.textContent = '⚡ INSTANT';
      status.textContent = 'Point at number';
      ready = true;
      return;
    } catch(e) { console.warn('TextDetector failed:', e); }
  }

  // Fallback: Tesseract.js (optimised for speed)
  badge.textContent = 'LOADING…';
  status.textContent = 'Loading OCR…';
  tessWorker = await Tesseract.createWorker('eng', 1, { logger: ()=>{} });
  await tessWorker.setParameters({
    tessedit_char_whitelist: '0123456789',
    tessedit_pageseg_mode: '7',          // single-line — fastest mode
  });
  badge.textContent = 'TESSERACT';
  status.textContent = 'Point at number';
  ready = true;
}

// ── correct crop rect for object-fit:cover ───────────────────
function getCropRect() {
  const vw = video.videoWidth, vh = video.videoHeight;
  const ew = video.offsetWidth,  eh = video.offsetHeight;
  if (!vw || !vh) return null;
  const vAR = vw / vh, eAR = ew / eh;
  let sx = 0, sy = 0, sw = vw, sh = vh;
  if (vAR > eAR) { sw = Math.round(vh * eAR); sx = Math.round((vw - sw) / 2); }
  else            { sh = Math.round(vw / eAR); sy = Math.round((vh - sh) / 2); }
  const bw = sw * BW, bh = sh * BH;
  return { x: sx + (sw - bw) / 2, y: sy + (sh - bh) / 2, w: bw, h: bh };
}

// ── preprocess for Tesseract (auto dark/light bg) ────────────
function preprocess(sw, sh) {
  const id = ctx.getImageData(0, 0, sw, sh);
  const d  = id.data;
  let sum = 0;
  for (let i = 0; i < d.length; i += 4)
    sum += 0.299 * d[i] + 0.587 * d[i+1] + 0.114 * d[i+2];
  const avg  = sum / (d.length / 4);
  const dark = avg < 128;
  for (let i = 0; i < d.length; i += 4) {
    const g = 0.299 * d[i] + 0.587 * d[i+1] + 0.114 * d[i+2];
    const out = dark ? (g > avg ? 0 : 255) : (g < avg ? 0 : 255);
    d[i] = d[i+1] = d[i+2] = out; d[i+3] = 255;
  }
  ctx.putImageData(id, 0, 0);
}

// ── native scan ──────────────────────────────────────────────
async function scanNative() {
  const detections = await nativeDetector.detect(video);
  const allText = detections.map(d => d.rawValue).join(' ');
  return findNumber(allText);
}

// ── tesseract scan ───────────────────────────────────────────
async function scanTess() {
  const r = getCropRect();
  if (!r) return null;
  const SCALE = 2;                               // 2x — faster than 4x
  const sw = Math.round(r.w * SCALE), sh = Math.round(r.h * SCALE);
  canvas.width = sw; canvas.height = sh;
  ctx.drawImage(video, r.x, r.y, r.w, r.h, 0, 0, sw, sh);
  preprocess(sw, sh);
  const { data: { text } } = await tessWorker.recognize(canvas);
  return findNumber(text);
}

// ── apply result ─────────────────────────────────────────────
function applyResult(found) {
  if (!found) {
    box.className = '';
    status.className = '';
    status.textContent = 'Scanning…';
    return;
  }

  const { num, full } = found;

  // always update display immediately
  result.textContent = num;
  result.classList.remove('empty', 'full', 'partial');
  numCard.classList.remove('active', 'partial-card');

  if (full) {
    result.classList.add('full');
    numCard.classList.add('active');
    box.className = 'hit';
    status.className = 'hit-pill';
    status.textContent = '✓ Copied!';

    // update call button
    callBtn.href = 'tel:' + num;
    callBtn.innerHTML = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 10.8 19.79 19.79 0 01.1 2.18 2 2 0 012.08 0h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.09 7.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/></svg> Call ${num}`;
    callBtn.classList.remove('off');

    // auto-copy
    if (num !== lastFull) {
      lastFull = num;
      navigator.clipboard.writeText(num).catch(() => {});
      navigator.vibrate && navigator.vibrate([60, 30, 60]);
      flashCopy();
    }
  } else {
    // partial – show amber preview, no call button yet
    result.classList.add('partial');
    numCard.classList.add('partial-card');
    box.className = '';
    status.className = 'partial-pill';
    status.textContent = 'Reading…';
  }
}

function flashCopy() {
  copyBtn.textContent = '✓ Copied';
  copyBtn.classList.add('done');
  setTimeout(() => {
    copyBtn.textContent = 'Copy';
    copyBtn.classList.remove('done');
  }, 1500);
}

// ── manual copy ──────────────────────────────────────────────
function copyNum() {
  const num = result.textContent;
  if (!num || result.classList.contains('empty')) return;
  navigator.clipboard.writeText(num).then(() => flashCopy()).catch(() => {});
}

// ── main loop ────────────────────────────────────────────────
async function loop() {
  if (looping || !ready) return;
  looping = true;
  try {
    const found = useNative ? await scanNative() : await scanTess();
    applyResult(found);
  } catch(e) {
    status.textContent = 'Err: ' + e.message;
    console.error(e);
  }
  looping = false;
  // native ≈ instant → 150 ms;  tesseract → 300 ms
  setTimeout(loop, useNative ? 150 : 300);
}

// ── boot ─────────────────────────────────────────────────────
(async () => {
  try {
    await startCamera();
    await initEngine();
    loop();
  } catch(e) {
    status.textContent = e.message || 'Failed to start';
    console.error(e);
  }
})();
</script>
</body>
</html>
