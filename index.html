<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Iraqi Number Scanner</title>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0d0d0d;
      color: #fff;
      font-family: 'Segoe UI', sans-serif;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow: hidden;
    }

    h1 {
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #00e5ff;
      padding: 10px 0 6px;
    }

    #camera-wrap {
      position: relative;
      width: 100%;
      max-width: 480px;
      flex: 1;
      overflow: hidden;
      background: #000;
    }

    #video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* scan region overlay */
    #overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    /* dark mask around scan box */
    .mask-top, .mask-bot, .mask-left, .mask-right {
      position: absolute;
      background: rgba(0,0,0,0.55);
    }
    .mask-top    { top: 0; left: 0; right: 0; }
    .mask-bot    { bottom: 0; left: 0; right: 0; }
    .mask-left   { top: var(--st); bottom: var(--sb); left: 0; width: var(--sl); }
    .mask-right  { top: var(--st); bottom: var(--sb); right: 0; width: var(--sr); }

    #scan-box {
      position: absolute;
      border: 2px solid #00e5ff;
      border-radius: 6px;
      box-shadow: 0 0 0 9999px rgba(0,0,0,0.55);
      animation: pulse 1.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { border-color: #00e5ff; box-shadow: 0 0 0 9999px rgba(0,0,0,0.55), 0 0 8px #00e5ff; }
      50%       { border-color: #00ffaa; box-shadow: 0 0 0 9999px rgba(0,0,0,0.55), 0 0 18px #00ffaa; }
    }

    /* corner ticks */
    .corner {
      position: absolute;
      width: 14px; height: 14px;
      border-color: #00e5ff;
      border-style: solid;
    }
    .tl { top: -2px; left: -2px;  border-width: 3px 0 0 3px; border-radius: 4px 0 0 0; }
    .tr { top: -2px; right: -2px; border-width: 3px 3px 0 0; border-radius: 0 4px 0 0; }
    .bl { bottom: -2px; left: -2px;  border-width: 0 0 3px 3px; border-radius: 0 0 0 4px; }
    .br { bottom: -2px; right: -2px; border-width: 0 3px 3px 0; border-radius: 0 0 4px 0; }

    /* scan line animation */
    #scan-line {
      position: absolute;
      left: 4px; right: 4px;
      height: 2px;
      background: linear-gradient(90deg, transparent, #00e5ff, transparent);
      animation: scanline 1s linear infinite;
    }
    @keyframes scanline {
      0%   { top: 6px; opacity: 1; }
      95%  { top: calc(100% - 6px); opacity: 1; }
      100% { top: calc(100% - 6px); opacity: 0; }
    }

    #status {
      font-size: 0.78rem;
      color: #aaa;
      position: absolute;
      bottom: 8px;
      width: 100%;
      text-align: center;
      letter-spacing: 1px;
    }

    /* bottom panel */
    #panel {
      width: 100%;
      max-width: 480px;
      background: #141414;
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    #result-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    #result {
      flex: 1;
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: 3px;
      color: #00e5ff;
      font-family: monospace;
      min-height: 2rem;
      word-break: break-all;
    }

    #copy-btn {
      background: #1e1e1e;
      border: 1px solid #333;
      color: #fff;
      padding: 8px 14px;
      border-radius: 8px;
      font-size: 0.8rem;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }
    #copy-btn:active { background: #2a2a2a; }

    #call-btn {
      display: block;
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #00c853, #00e676);
      color: #000;
      font-weight: 700;
      font-size: 1.1rem;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      text-align: center;
      text-decoration: none;
      letter-spacing: 2px;
      transition: opacity 0.2s;
    }
    #call-btn.disabled {
      background: #2a2a2a;
      color: #555;
      pointer-events: none;
    }

    #confidence-bar {
      height: 3px;
      background: #1e1e1e;
      border-radius: 2px;
      overflow: hidden;
    }
    #confidence-fill {
      height: 100%;
      width: 0%;
      background: #00e5ff;
      transition: width 0.3s, background 0.3s;
    }

    canvas { display: none; }
  </style>
</head>
<body>

<h1>&#128222; Iraqi Scanner</h1>

<div id="camera-wrap">
  <video id="video" autoplay playsinline muted></video>
  <div id="overlay">
    <div id="scan-box">
      <div class="corner tl"></div>
      <div class="corner tr"></div>
      <div class="corner bl"></div>
      <div class="corner br"></div>
      <div id="scan-line"></div>
    </div>
  </div>
  <div id="status">Initializing…</div>
</div>

<div id="panel">
  <div id="confidence-bar"><div id="confidence-fill"></div></div>
  <div id="result-row">
    <div id="result">—</div>
    <button id="copy-btn" onclick="copyNumber()">Copy</button>
  </div>
  <a id="call-btn" class="disabled" href="#">&#128222;&nbsp; Call</a>
</div>

<canvas id="canvas"></canvas>

<script>
// ── config ────────────────────────────────────────────────
const IRAQI_RE = /07[3-9]\d{8}/g;   // 07X-XXXXXXXX, 11 digits
const SCAN_W_RATIO  = 0.85;          // scan box width  = 85% of video
const SCAN_H_RATIO  = 0.22;          // scan box height = 22% of video
const FRAME_MS      = 700;           // process every 700 ms

// ── DOM refs ──────────────────────────────────────────────
const video    = document.getElementById('video');
const canvas   = document.getElementById('canvas');
const ctx      = canvas.getContext('2d');
const statusEl = document.getElementById('status');
const resultEl = document.getElementById('result');
const fillEl   = document.getElementById('confidence-fill');
const callBtn  = document.getElementById('call-btn');
const scanBox  = document.getElementById('scan-box');

let worker, scanning = false, lastNumber = '';

// ── init Tesseract ────────────────────────────────────────
async function initOCR() {
  worker = await Tesseract.createWorker('eng', 1, {
    logger: () => {},
  });
  await worker.setParameters({
    tessedit_char_whitelist: '0123456789',
    tessedit_pageseg_mode: '7',   // single text line
    tessedit_do_invert: '0',
  });
  statusEl.textContent = 'Point camera at number';
}

// ── camera ────────────────────────────────────────────────
async function startCamera() {
  statusEl.textContent = 'Starting camera…';
  const stream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } },
    audio: false,
  });
  video.srcObject = stream;
  await new Promise(r => video.onloadedmetadata = r);
  positionScanBox();
}

function positionScanBox() {
  const vw = video.offsetWidth, vh = video.offsetHeight;
  const bw = vw * SCAN_W_RATIO, bh = vh * SCAN_H_RATIO;
  const bx = (vw - bw) / 2, by = (vh - bh) / 2;
  Object.assign(scanBox.style, {
    left:   bx + 'px', top:    by + 'px',
    width:  bw + 'px', height: bh + 'px',
  });
}

window.addEventListener('resize', positionScanBox);

// ── frame grabber ─────────────────────────────────────────
function grabScanRegion() {
  const vw = video.videoWidth, vh = video.videoHeight;
  const bw = vw * SCAN_W_RATIO, bh = vh * SCAN_H_RATIO;
  const bx = (vw - bw) / 2,   by = (vh - bh) / 2;

  canvas.width  = bw;
  canvas.height = bh;

  // draw & pre-process (greyscale + contrast boost)
  ctx.filter = 'grayscale(1) contrast(2) brightness(1.1)';
  ctx.drawImage(video, bx, by, bw, bh, 0, 0, bw, bh);
  ctx.filter = 'none';

  return canvas;
}

// ── OCR loop ──────────────────────────────────────────────
async function scanLoop() {
  if (scanning) return;
  scanning = true;

  const img = grabScanRegion();

  try {
    const { data: { text, confidence } } = await worker.recognize(img);

    // pull all Iraqi-looking numbers from raw text
    const raw = text.replace(/\s/g, '');
    const matches = raw.match(IRAQI_RE);

    if (matches && matches.length > 0) {
      const num = matches[0];
      fillEl.style.width = confidence + '%';
      fillEl.style.background = confidence > 70 ? '#00e676' : '#ffca28';

      if (num !== lastNumber) {
        lastNumber = num;
        setResult(num);
        navigator.vibrate && navigator.vibrate([60, 30, 60]);
      }
      statusEl.textContent = `Detected ✓  (${Math.round(confidence)}%)`;
    } else {
      fillEl.style.width = '0%';
      statusEl.textContent = 'Scanning…';
    }
  } catch (e) {
    statusEl.textContent = 'OCR error — retrying';
  }

  scanning = false;
  setTimeout(scanLoop, FRAME_MS);
}

// ── result handling ───────────────────────────────────────
function setResult(num) {
  resultEl.textContent = num;
  callBtn.href = 'tel:' + num;
  callBtn.textContent = '📞  Call ' + num;
  callBtn.classList.remove('disabled');

  // auto-copy to clipboard
  navigator.clipboard.writeText(num).catch(() => {});
}

function copyNumber() {
  if (lastNumber) {
    navigator.clipboard.writeText(lastNumber).then(() => {
      const btn = document.getElementById('copy-btn');
      btn.textContent = 'Copied!';
      setTimeout(() => btn.textContent = 'Copy', 1200);
    });
  }
}

// ── boot ──────────────────────────────────────────────────
(async () => {
  try {
    await startCamera();
    await initOCR();
    scanLoop();
  } catch (err) {
    statusEl.textContent = err.message || 'Error starting';
    console.error(err);
  }
})();
</script>
</body>
</html>
